<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating Kepuasan - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding:15px}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
@keyframes glow{0%,100%{text-shadow:0 0 10px #22c55e}50%{text-shadow:0 0 20px #22c55e}}

.container{max-width:600px;margin:0 auto;position:relative;z-index:1}
h1{color:#22c55e;text-align:center;margin-bottom:20px;font-size:24px;animation:glow 2s infinite}

/* FORM CUSTOMER */
.rating-box{background:#111;border:2px solid #22c55e;border-radius:15px;padding:30px;margin-bottom:20px;text-align:center}
.rating-box h2{color:#22c55e;margin-bottom:10px;font-size:20px}
.rating-box p{color:#9ca3af;margin-bottom:25px;font-size:14px}

.stars{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.star{font-size:50px;color:#333;cursor:pointer;transition:0.3s;user-select:none}
.star:hover, .star.active{color:#fbbf24;transform:scale(1.2)}

input,textarea{width:100%;padding:12px;background:#1a1a1a;border:2px solid #333;border-radius:8px;color:#e5e7eb;margin-bottom:12px;font-size:15px;font-family:inherit}
textarea{resize:vertical;min-height:80px}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;border:none;border-radius:8px;font-weight:800;font-size:16px;cursor:pointer;transition:0.3s}
.btn:hover{transform:scale(1.03)}
.btn-small{padding:6px 12px;font-size:12px;width:auto}
.btn-danger{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff}
.success{color:#22c55e;text-align:center;margin-top:15px;display:none;font-weight:700}

/* PANEL FITUR OWNER */
.hidden{display:none}
.owner-panel{background:#111;border:2px solid #22c55e;border-radius:12px;padding:20px;margin-top:20px}
.owner-panel h3{color:#22c55e;margin-bottom:15px;font-size:18px}
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.stat-card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px;text-align:center}
.stat-card .num{font-size:24px;font-weight:800;color:#22c55e}
.stat-card .label{font-size:11px;color:#9ca3af}

.review-item{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.review-stars{color:#fbbf24;margin-bottom:5px}
.review-text{color:#d1d5db;font-size:13px;margin-bottom:5px}
.review-date{color:#666;font-size:11px}
.logout-btn{float:right;background:#ef4444;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}

.login-box{max-width:400px;margin:80px auto;background:#111;border:2px solid #22c55e;border-radius:15px;padding:30px;text-align:center}
input:focus,textarea:focus{border-color:#22c55e;outline:none}

.back-btn{display:inline-block;margin-top:15px;color:#9ca3af;text-decoration:none;font-size:13px}
.back-btn:hover{color:#22c55e}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="container">
<h1>⭐ PENILAIAN KEPUASAN</h1>

<!-- 1. FORM CUSTOMER KASIH RATING -->
<div id="formCustomer">
<div class="rating-box">
<h2>Beri Penilaian Anda</h2>
<p>Seberapa puas Anda dengan layanan Taufiq Store?</p>
<div class="stars" id="starRating">
<span class="star" data-rate="1">★</span>
<span class="star" data-rate="2">★</span>
<span class="star" data-rate="3">★</span>
<span class="star" data-rate="4">★</span>
<span class="star" data-rate="5">★</span>
</div>
<input type="text" id="namaCustomer" placeholder="Nama Anda (Opsional)">
<textarea id="komentar" placeholder="Komentar & saran... (Opsional)"></textarea>
<button class="btn" onclick="kirimRating()">KIRIM PENILAIAN</button>
<div class="success" id="suksesMsg">✅ Terima kasih atas penilaian Anda!</div>

<!-- TOMBOL KEMBALI KE ABOUT -->
<a href="./about.html" class="back-btn">← Kembali ke Tentang Kami</a>
</div>

<!-- TOMBOL FITUR OWNER BUAT LU -->
<div style="text-align:center;margin-top:20px">
<button class="btn" style="width:auto;padding:8px 20px;font-size:13px;background:#1a1a1a;color:#22c55e;border:2px solid #22c55e" onclick="bukaPanelOwner()">🔒 Login FITUR OWNER</button>
</div>
</div>

<!-- 2. LOGIN FITUR OWNER -->
<div class="login-box hidden" id="loginOwner">
<h2 style="color:#22c55e;margin-bottom:20px">🔒 Login FITUR OWNER</h2>
<input type="text" id="userOwner" placeholder="Username" autocomplete="off">
<input type="password" id="passOwner" placeholder="Password">
<button class="btn" onclick="loginOwner()">MASUK</button>
<a href="./about.html" class="back-btn">← Kembali</a>
</div>

<!-- 3. PANEL FITUR OWNER LIAT RATING -->
<div class="owner-panel hidden" id="panelOwner">
<button class="logout-btn" onclick="logoutOwner()">Logout</button>
<h3>📊 FITUR OWNER - Statistik Rating</h3>

<div class="stat-grid" id="statGrid"></div>

<h3 style="margin-top:25px">💬 Ulasan Customer</h3>
<div id="listUlasan"></div>
<button class="btn btn-small btn-danger" style="margin-top:15px" onclick="hapusSemuaRating()">Hapus Semua Rating</button>
</div>
</div>

<script>
let ratingTerpilih = 0;

// PILIH BINTANG
document.querySelectorAll('.star').forEach(star => {
  star.addEventListener('click', function(){
    ratingTerpilih = this.dataset.rate;
    document.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('active', i < ratingTerpilih);
    });
  });
});

// KIRIM RATING CUSTOMER
function kirimRating(){
  if(ratingTerpilih == 0){
    alert('Pilih bintang dulu bang!');
    return;
  }
  
  let data = {
    id: Date.now(),
    bintang: Number(ratingTerpilih),
    nama: document.getElementById('namaCustomer').value || 'Anonim',
    komentar: document.getElementById('komentar').value,
    waktu: new Date().toISOString()
  };
  
  let ratings = JSON.parse(localStorage.getItem('ratings')) || [];
  ratings.push(data);
  localStorage.setItem('ratings', JSON.stringify(ratings));
  
  document.getElementById('suksesMsg').style.display = 'block';
  document.getElementById('namaCustomer').value = '';
  document.getElementById('komentar').value = '';
  document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
  ratingTerpilih = 0;
  
  setTimeout(() => {
    document.getElementById('suksesMsg').style.display = 'none';
  }, 3000);
}

// LOGIN LOGOUT FITUR OWNER
function bukaPanelOwner(){
  document.getElementById('formCustomer').classList.add('hidden');
  document.getElementById('loginOwner').classList.remove('hidden');
}

function loginOwner(){
  let u = document.getElementById('userOwner').value;
  let p = document.getElementById('passOwner').value;
  
  if(u === 'admin' && p === 'admin123'){
    localStorage.setItem('retingLogin', 'true');
    document.getElementById('loginOwner').classList.add('hidden');
    document.getElementById('panelOwner').classList.remove('hidden');
    loadStatistik();
  } else {
    alert('Username/Password salah! Default: admin / admin123');
  }
}

function logoutOwner(){
  localStorage.removeItem('retingLogin');
  document.getElementById('panelOwner').classList.add('hidden');
  document.getElementById('formCustomer').classList.remove('hidden');
  document.getElementById('userOwner').value = '';
  document.getElementById('passOwner').value = '';
}

// LOAD STATISTIK + ULASAN
function loadStatistik(){
  let ratings = JSON.parse(localStorage.getItem('ratings')) || [];
  
  let count = [0,0,0,0,0,0];
  ratings.forEach(r => count[r.bintang]++);
  
  let html = '';
  for(let i=5; i>=1; i--){
    html += `<div class="stat-card">
      <div class="num">${count[i]}</div>
      <div class="label">${i} ⭐</div>
    </div>`;
  }
  document.getElementById('statGrid').innerHTML = html;
  
  let ulasanHtml = '';
  ratings.slice().reverse().forEach(r => {
    let stars = '⭐'.repeat(r.bintang);
    let waktu = new Date(r.waktu).toLocaleString('id-ID');
    ulasanHtml += `<div class="review-item">
      <div class="review-stars">${stars}</div>
      <div class="review-text"><b>${r.nama}:</b> ${r.komentar || '-'}</div>
      <div class="review-date">${waktu}</div>
      <button class="btn-small btn-danger" style="position:absolute;top:8px;right:8px" onclick="hapusRating(${r.id})">Hapus</button>
    </div>`;
  });
  document.getElementById('listUlasan').innerHTML = ulasanHtml || '<div style="color:#666;text-align:center">Belum ada ulasan</div>';
}

// HAPUS RATING
function hapusRating(id){
  if(confirm('Hapus rating ini?')){
    let ratings = JSON.parse(localStorage.getItem('ratings')) || [];
    ratings = ratings.filter(r => r.id !== id);
    localStorage.setItem('ratings', JSON.stringify(ratings));
    loadStatistik();
  }
}

function hapusSemuaRating(){
  if(confirm('Hapus semua rating? Data tidak bisa dikembalikan!')){
    localStorage.removeItem('ratings');
    loadStatistik();
  }
}

// AUTO LOGIN FITUR OWNER
window.onload = function(){
  if(localStorage.getItem('retingLogin') === 'true'){
    document.getElementById('formCustomer').classList.add('hidden');
    document.getElementById('panelOwner').classList.remove('hidden');
    loadStatistik();
  }
}

document.getElementById('passOwner').addEventListener('keypress', e => {
  if(e.key === 'Enter') loginOwner();
});

// BINTANG JATUH
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<50;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:Math.random()*0.3-0.15});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
</script>
</body>
  </html>
