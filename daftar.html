<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

@keyframes fadeInScale{0%{opacity:0;transform:scale(0.8)}100%{opacity:1;transform:scale(1)}}
@keyframes neonGlow{0%,100%{box-shadow:0 0 20px #22c55e,0 0 40px #22c55e}50%{box-shadow:0 0 30px #16a34a,0 0 60px #16a34a}}
@keyframes rotate3d{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.box{background:rgba(17,17,17,0.95);backdrop-filter:blur(10px);border:2px solid #22c55e;border-radius:25px;padding:40px;text-align:center;max-width:450px;width:100%;position:relative;z-index:1;animation:fadeInScale 0.8s ease-out, neonGlow 2s infinite}
.box::before{content:'';position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;background:linear-gradient(45deg,#22c55e,#3b82f6,#22c55e);background-size:300% 300%;border-radius:25px;z-index:-1;filter:blur(15px);opacity:0.5;animation:neonGlow 4s ease infinite}

/* LOGO 3D HOLOGRAM */
.logo-3d{width:90px;height:90px;margin:0 auto 20px;position:relative;transform-style:preserve-3d;animation:rotate3d 6s infinite linear, float 3s ease-in-out infinite}
.logo-face{position:absolute;width:90px;height:90px;background:linear-gradient(135deg,#22c55e,#3b82f6);border:2px solid #22c55e;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;color:#000;box-shadow:0 0 25px rgba(34,197,94,0.8)}
.logo-face:nth-child(1){transform:rotateY(0deg) translateZ(45px)}
.logo-face:nth-child(2){transform:rotateY(90deg) translateZ(45px)}
.logo-face:nth-child(3){transform:rotateY(180deg) translateZ(45px)}
.logo-face:nth-child(4){transform:rotateY(270deg) translateZ(45px)}

h1{color:#22c55e;margin-bottom:10px;font-size:28px;font-weight:900;text-shadow:0 0 15px #22c55e}
.bonus-box{background:linear-gradient(90deg,#fbbf24,#f59e0b,#fbbf24);background-size:200% 200%;color:#000;border-radius:12px;padding:10px;margin-bottom:20px;font-weight:800;font-size:14px;animation:neonGlow 2s infinite}

input{width:100%;padding:15px;background:rgba(26,26,26,0.8);border:2px solid #333;border-radius:12px;color:#e5e7eb;margin-bottom:12px;font-size:15px;transition:0.3s}
input:focus{border-color:#22c55e;outline:none;box-shadow:0 0 15px rgba(34,197,94,0.4);transform:scale(1.02)}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#22c55e 0%,#3b82f6 50%,#22c55e 100%);background-size:200% 200%;color:#000;border:none;border-radius:12px;font-weight:900;font-size:17px;cursor:pointer;margin-top:5px;transition:0.3s;letter-spacing:1px}
.btn:hover{transform:scale(1.05);box-shadow:0 8px 25px rgba(34,197,94,0.6)}
.success{color:#22c55e;text-align:center;margin-top:12px;display:none;font-weight:800;font-size:15px}
.link{margin-top:18px;font-size:13px;color:#9ca3af}
.link a{color:#22c55e;font-weight:800;text-decoration:none}
.link a:hover{text-shadow:0 0 10px #22c55e}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="box">
<div class="logo-3d">
<div class="logo-face">TS</div>
<div class="logo-face">TS</div>
<div class="logo-face">TS</div>
<div class="logo-face">TS</div>
</div>

<h1>DAFTAR GRATIS</h1>
<div class="bonus-box">🎁 BONUS 5% MEMBER BARU</div>

<input type="text" id="namaDaftar" placeholder="👤 Nama / Username">
<input type="password" id="passDaftar" placeholder="🔒 Password min 6 karakter">
<input type="tel" id="waDaftar" placeholder="📱 WhatsApp 08xxx">

<button class="btn" onclick="daftarAkun()">⚡ DAFTAR SEKARANG</button>
<div class="success" id="suksesDaftar">✅ Daftar berhasil! Silakan login</div>

<div class="link">Udah punya akun? <a href="login.html">Login disini</a></div>
</div>

<script>
// KALO UDAH LOGIN GA USAH DAFTAR LAGI
if(localStorage.getItem('userLogin')){
  window.location.replace('index.html');
}

function daftarAkun(){
  let nama = document.getElementById('namaDaftar').value.trim();
  let pass = document.getElementById('passDaftar').value.trim();
  let wa = document.getElementById('waDaftar').value.trim();

  if(!nama ||!pass ||!wa){alert('Isi semua kolom bang!');return;}
  if(pass.length < 6){alert('Password minimal 6 karakter!');return;}

  let users = JSON.parse(localStorage.getItem('users')) || [];
  if(users.find(u => u.nama.toLowerCase() === nama.toLowerCase())){
    alert('Username udah dipake! Pilih yang lain.');return;
  }

  // SIMPEN DATA DOANG, GA AUTO LOGIN
  let userData = {nama: nama, pass: pass, wa: wa};
  users.push(userData);
  localStorage.setItem('users', JSON.stringify(users));

  // SUKSES + KOSONGIN FORM
  document.getElementById('suksesDaftar').style.display = 'block';
  document.getElementById('namaDaftar').value = '';
  document.getElementById('passDaftar').value = '';
  document.getElementById('waDaftar').value = '';
  document.querySelector('.btn').innerText = '✅ BERHASIL DAFTAR';
  document.querySelector('.btn').disabled = true;
  document.querySelector('.btn').style.background = 'linear-gradient(135deg,#10b981,#059669)';
}

// BACKGROUND PARTICLE GALAXY
const c=document.getElementById('bg'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+0.5,dy:Math.random()*0.8+0.3,dx:Math.random()*0.6-0.3,op:Math.random()*0.5+0.3});
function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{ctx.fillStyle='#22c55e';ctx.globalAlpha=s.op;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();s.y+=s.dy;s.x+=s.dx;if(s.y>c.height){s.y=-10;s.x=Math.random()*c.width}});requestAnimationFrame(draw)}
draw();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
</script>
</body>
</html>
