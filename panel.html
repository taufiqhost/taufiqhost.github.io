<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding-bottom:80px;animation:fadeIn 0.5s}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

@keyframes glow{0%,100%{text-shadow:0 0 5px #22c55e,0 0 10px #22c55e}50%{text-shadow:0 0 20px #22c55e,0 0 30px #22c55e}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

header{background:#111;border-bottom:3px solid #22c55e;padding:25px;text-align:center;position:sticky;top:0;z-index:10}
header h1{color:#22c55e;font-size:26px;font-weight:900;letter-spacing:2px;animation:glow 2s infinite}

.container{max-width:1000px;margin:20px auto;padding:0 15px;position:relative;z-index:1}

/* PRODUK 2 KOLOM PER BARIS */
.produk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.produk-card{background:#111;border:2px solid #222;border-radius:12px;padding:12px;transition:0.3s;animation:fadeIn 0.6s}
.produk-card:hover{border-color:#22c55e;transform:translateY(-3px);box-shadow:0 0 15px rgba(34,197,94,0.3)}
.produk-img{width:100%;height:140px;object-fit:cover;border-radius:8px;border:2px solid #333;margin-bottom:10px}
.produk-nama{font-size:14px;font-weight:700;color:#22c55e;margin-bottom:5px}
.produk-desc{font-size:12px;color:#9ca3af;margin-bottom:8px;min-height:32px;overflow:hidden}
.produk-harga{font-size:15px;font-weight:900;color:#fff;margin-bottom:6px}
.badge-promo{background:#ef4444;color:#fff;padding:3px 6px;border-radius:5px;font-size:10px;font-weight:700;display:inline-block;margin-bottom:6px}
.btn-beli{width:100%;padding:8px;background:#22c55e;color:#000;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
.btn-beli:hover{background:#16a34a}
.empty{grid-column:1/-1;text-align:center;padding:50px;color:#666}

/* NAVBAR 6 MENU FIX - OWNER PALING KAN */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:3px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:8px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.5)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1;cursor:pointer;transition:0.2s}
.nav-item.active{color:#22c55e;font-weight:700}
.nav-item:hover{color:#22c55e}
.nav-icon{font-size:22px;margin-bottom:3px}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
<h1>📦 DAFTAR PRODUK</h1>
</header>

<div class="container">
<div class="produk-grid" id="produkGrid"></div>
</div>

<!-- NAVBAR BAWAH 6 MENU - OWNER PALING KAN -->
<nav class="bottom-nav">
<a href="index.html" class="nav-item">
<div class="nav-icon">🏠</div>
<span>Beranda</span>
</a>
<a href="panel.html" class="nav-item active">
<div class="nav-icon">📦</div>
<span>Produk</span>
</a>
<a href="tentang.html" class="nav-item">
<div class="nav-icon">ℹ️</div>
<span>Tentang</span>
</a>
<a href="reting.html" class="nav-item">
<div class="nav-icon">⭐</div>
<span>Rating</span>
</a>
<a href="#" onclick="logoutUser()" class="nav-item">
<div class="nav-icon">👤</div>
<span>Akun</span>
</a>
<a href="owner.html" class="nav-item">
<div class="nav-icon">👑</div>
<span>Owner</span>
</a>
</nav>

<script>
// LOAD PRODUK DARI LOCALSTORAGE
function loadProduk(){
  let produk = JSON.parse(localStorage.getItem('produk') || '[]');
  let grid = document.getElementById('produkGrid');
  
  if(produk.length === 0){
    grid.innerHTML = '<div class="empty">Belum ada produk. Tambah dulu di panel Owner 👑</div>';
    return;
  }
  
  let html = '';
  produk.forEach(p=>{
    html += `<div class="produk-card">
      <img src="${p.foto}" class="produk-img" onerror="this.src='https://via.placeholder.com/250x180/111/22c55e?text=No+Image'">
      ${p.promo ? '<span class="badge-promo">PROMO</span>' : ''}
      <div class="produk-nama">${p.nama}</div>
      <div class="produk-desc">${p.desc || 'Tanpa deskripsi'}</div>
      <div class="produk-harga">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</div>
      <button class="btn-beli" onclick="beliProduk('${p.nama}')">BELI SEKARANG</button>
    </div>`;
  });
  grid.innerHTML = html;
}

function beliProduk(nama){
  let wa = '628123456789'; // ganti nomor WA lu disini bang
  let msg = encodeURIComponent(`Halo bang, saya mau beli produk: ${nama}`);
  window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
}

function logoutUser(){
  localStorage.removeItem('login');
  localStorage.removeItem('user');
  alert('Logout berhasil!');
  window.location.href = 'index.html';
}

// BINTANG JATUH
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<60;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:0.1});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});

// LOAD SAAT BUKA HALAMAN
loadProduk();
</script>
</body>
  </html>
