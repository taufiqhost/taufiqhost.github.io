<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding-bottom:70px}
header{padding:20px;text-align:center;border-bottom:2px solid #22c55e}
header h1{color:#22c55e;font-size:22px;text-shadow:0 0 10px #22c55e}
.search-box{padding:15px;display:flex;gap:10px}
.search-box input{flex:1;padding:12px;background:#111;border:1px solid #333;border-radius:8px;color:#e5e7eb;outline:none}
.search-box input:focus{border-color:#22c55e}
.cart-btn{padding:12px 15px;background:#22c55e;border:none;border-radius:8px;position:relative;cursor:pointer}
.cart-badge{position:absolute;top:-5px;right:-5px;background:red;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center}

.produk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px}
.card{background:#111;border:1px solid #222;border-radius:12px;overflow:hidden;text-align:left;transition:0.2s}
.card:hover{border-color:#22c55e}
.card img{width:100%;height:120px;object-fit:cover;background:#1a1a1a}
.card-body{padding:12px}
.card h3{color:#22c55e;font-size:14px;margin-bottom:4px}
.card p{color:#9ca3af;font-size:12px;margin-bottom:8px}
.card .harga{font-size:16px;font-weight:700;margin-bottom:8px}
.jumlah{display:flex;align-items:center;gap:5px;margin-bottom:8px;font-size:12px}
.jumlah input{width:50px;padding:5px;background:#0a0a0a;border:1px solid #333;border-radius:5px;color:#e5e7eb;text-align:center}
.btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:5px;transition:0.2s}
.btn-cart{background:#444;color:#e5e7eb}
.btn-cart:hover{background:#555}
.btn-buy{background:#22c55e;color:#000}
.btn-buy:hover{background:#16a34a}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1;cursor:pointer}
.nav-item.active{color:#22c55e;font-weight:700}
.nav-icon{font-size:20px;margin-bottom:2px}

.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:#9ca3af}
</style>
</head>
<body>

<header>
<h1>📦 DAFTAR PRODUK</h1>
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Cari produk...">
<button class="cart-btn" onclick="alert('Fitur keranjang soon')">🛒<span class="cart-badge" id="cartCount">0</span></button>
</div>

<div class="produk-grid" id="produkGrid"></div>

<nav class="bottom-nav">
<a href="index.html" class="nav-item"><div class="nav-icon">🏠</div><span>Beranda</span></a>
<a href="panel.html" class="nav-item active"><div class="nav-icon">📦</div><span>Produk</span></a>
<a href="tentang.html" class="nav-item"><div class="nav-icon">ℹ️</div><span>Tentang</span></a>
<a href="reting.html" class="nav-item"><div class="nav-icon">⭐</div><span>Rating</span></a>
<a href="#" onclick="tampilAkun()" class="nav-item"><div class="nav-icon">👤</div><span>Akun</span></a>
<div onclick="alert('Login owner di index.html bang')" class="nav-item"><div class="nav-icon">👑</div><span>Owner</span></div>
</nav>

<script>
let user = JSON.parse(localStorage.getItem('userLogin') || '{}');
let cart = JSON.parse(localStorage.getItem('cart') || '[]');

// PRODUK DEFAULT - 2 produk lu yang di SS
const produkDefault = [
  {
    id: 1,
    nama: "PANEL RAM 1GB",
    desc: "Tanpa deskripsi",
    harga: 1000,
    img: "https://i.ibb.co/6J2wZqF/ptero.png"
  },
  {
    id: 2,
    nama: "PANEL RAM 2GB", 
    desc: "Tanpa deskripsi",
    harga: 2000,
    img: "https://i.ibb.co/6J2wZqF/ptero.png"
  }
];

// LOAD PRODUK: kalo localStorage kosong, pake default
function loadProduk(){
  let produk = JSON.parse(localStorage.getItem('produk'));
  if(!produk || produk.length === 0){
    localStorage.setItem('produk', JSON.stringify(produkDefault));
    produk = produkDefault;
  }
  return produk;
}

let produkList = loadProduk();

// TAMPILIN PRODUK
function renderProduk(list = produkList){
  const grid = document.getElementById('produkGrid');
  if(list.length === 0){
    grid.innerHTML = '<div class="empty">Produk kosong bang 😅</div>';
    return;
  }
  
  grid.innerHTML = list.map(p => `
    <div class="card">
      <img src="${p.img}" alt="${p.nama}">
      <div class="card-body">
        <h3>${p.nama}</h3>
        <p>${p.desc}</p>
        <div class="harga">Rp ${p.harga.toLocaleString('id-ID')}</div>
        <div class="jumlah">Jumlah: <input type="number" id="qty${p.id}" value="1" min="1"></div>
        <button class="btn btn-cart" onclick="addCart(${p.id})">+ Keranjang</button>
        <button class="btn btn-buy" onclick="waOrder(${p.id})">Beli Sekarang</button>
      </div>
    </div>
  `).join('');
}

// CARI PRODUK
document.getElementById('searchInput').addEventListener('input', e => {
  let keyword = e.target.value.toLowerCase();
  let hasil = produkList.filter(p => p.nama.toLowerCase().includes(keyword));
  renderProduk(hasil);
});

// ADD TO CART
function addCart(id){
  let qty = parseInt(document.getElementById('qty'+id).value);
  let produk = produkList.find(p => p.id === id);
  cart.push({...produk, qty});
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  alert(`✅ ${produk.nama} x${qty} masuk keranjang`);
}

// WA ORDER
function waOrder(id){
  let qty = parseInt(document.getElementById('qty'+id).value);
  let produk = produkList.find(p => p.id === id);
  let no = '6287785037018';
  let total = produk.harga * qty;
  let msg = `Halo bang, mau order:\n${produk.nama} x${qty}\nTotal: Rp${total.toLocaleString('id-ID')}`;
  window.open(`https://wa.me/${no}?text=${encodeURIComponent(msg)}`,'_blank');
}

// UPDATE CART COUNT
function updateCartCount(){
  document.getElementById('cartCount').textContent = cart.length;
}

// TAMPIL AKUN
function tampilAkun(){
  if(!user.nama) return alert('Silakan daftar dulu bang');
  alert(`👤 DATA AKUN KAMU\nNama: ${user.nama}\nWhatsApp: ${user.wa}\nRole: ${user.role}`);
}

// FIRST LOAD
renderProduk();
updateCartCount();
</script>

</body>
  </html>
