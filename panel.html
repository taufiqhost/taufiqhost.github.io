<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding-bottom:80px;animation:fadeIn 0.5s}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

@keyframes glow{0%,100%{text-shadow:0 0 5px #22c55e,0 0 10px #22c55e}50%{text-shadow:0 0 20px #22c55e,0 0 30px #22c55e}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

header{background:#111;border-bottom:3px solid #22c55e;padding:25px;text-align:center;position:sticky;top:0;z-index:10}
header h1{color:#22c55e;font-size:26px;font-weight:900;letter-spacing:2px;animation:glow 2s infinite}

.container{max-width:1000px;margin:20px auto;padding:0 15px;position:relative;z-index:1}

.produk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.produk-card{background:#111;border:2px solid #222;border-radius:15px;padding:15px;transition:0.3s;animation:fadeIn 0.6s}
.produk-card:hover{border-color:#22c55e;transform:translateY(-5px);box-shadow:0 0 20px rgba(34,197,94,0.3)}
.produk-img{width:100%;height:180px;object-fit:cover;border-radius:10px;border:2px solid #333;margin-bottom:12px}
.produk-nama{font-size:16px;font-weight:700;color:#22c55e;margin-bottom:6px}
.produk-desc{font-size:13px;color:#9ca3af;margin-bottom:10px;min-height:40px}
.produk-harga{font-size:18px;font-weight:900;color:#fff;margin-bottom:8px}
.badge-promo{background:#ef4444;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px}
.btn-beli{width:100%;padding:10px;background:#22c55e;color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.btn-beli:hover{background:#16a34a}
.empty{grid-column:1/-1;text-align:center;padding:50px;color:#666}

/* NAVBAR SAMA KAYAK OWNER */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1;cursor:pointer}
.nav-item.active{color:#22c55e;font-weight:700}
.nav-icon{font-size:20px;margin-bottom:2px}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
<h1>📦 DAFTAR PRODUK</h1>
</header>

<div class="container">
<div class="produk-grid" id="produkGrid"></div>
</div>

<a href="index.html" class="nav-item"><div
