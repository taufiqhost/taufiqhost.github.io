<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding-bottom:80px;animation:fadeIn 0.5s}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

@keyframes glow{0%,100%{text-shadow:0 0 5px #22c55e,0 0 10px #22c55e}50%{text-shadow:0 0 20px #22c55e,0 0 30px #22c55e}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

header{background:#111;border-bottom:3px solid #22c55e;padding:25px;text-align:center;position:sticky;top:0;z-index:10}
header h1{color:#22c55e;font-size:26px;font-weight:900;letter-spacing:2px;animation:glow 2s infinite}

.container{max-width:1000px;margin:20px auto;padding:0 15px;position:relative;z-index:1}

/* SEARCH + KERANJANG */
.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar input{flex:1;padding:12px;background:#0a0a0a;border:2px solid #333;border-radius:10px;color:#e5e7eb;font-size:14px}
.search-bar input:focus{border-color:#22c55e;outline:none;box-shadow:0 0 10px rgba(34,197,94,0.3)}
.btn-keranjang{padding:12px 16px;background:#22c55e;border:none;border-radius:10px;font-size:20px;cursor:pointer;position:relative}
.btn-keranjang:hover{background:#16a34a}
.cart-count{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* PRODUK 2 KOLOM PER BARIS */
.produk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.produk-card{background:#111;border:2px solid #222;border-radius:12px;padding:12px;transition:0.3s;animation:fadeIn 0.6s}
.produk-card:hover{border-color:#22c55e;transform:translateY(-3px);box-shadow:0 0 15px rgba(34,197,94,0.3)}
.produk-img{width:100%;height:140px;object-fit:cover;border-radius:8px;border:2px solid #333;margin-bottom:10px}
.produk-nama{font-size:14px;font-weight:700;color:#22c55e;margin-bottom:5px}
.produk-desc{font-size:12px;color:#9ca3af;margin-bottom:8px;min-height:32px;overflow:hidden}
.produk-harga{font-size:15px;font-weight:900;color:#fff;margin-bottom:6px}

/* INPUT JUMLAH */
.qty-group{display:flex;align-items:center;gap:5px;margin-bottom:8px}
.qty-group label{font-size:11px;color:#9ca3af}
.qty-group input{width:60px;padding:5px;background:#0a0a0a;border:1px solid #333;border-radius:5px;color:#fff;font-size:12px;text-align:center}
.qty-group input:focus{border-color:#22c55e;outline:none}

.badge-promo{background:#ef4444;color:#fff;padding:3px 6px;border-radius:5px;font-size:10px;font-weight:700;display:inline-block;margin-bottom:6px}
.btn-beli{width:100%;padding:8px;background:#22c55e;color:#000;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;margin-top:5px}
.btn-beli:hover{background:#16a34a}
.btn-keranjang-add{width:100%;padding:8px;background:#444;color:#fff;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
.btn-keranjang-add:hover{background:#555}
.empty{grid-column:1/-1;text-align:center;padding:50px;color:#666}

/* NAVBAR 6 MENU FIX - OWNER PALING KAN */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:3px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:8px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.5)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1;cursor:pointer;transition:0.2s}
.nav-item.active{color:#22c55e;font-weight:700}
.nav-item:hover{color:#22c55e}
.nav-icon{font-size:22px;margin-bottom:3px}

/* POPUP KERANJANG */
.cart-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:2px solid #22c55e;border-radius:15px;padding:20px;width:90%;max-width:400px;z-index:10000;display:none;max-height:70vh;overflow-y:auto}
.cart-popup.active{display:block}
.cart-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #222}
.cart-item img{width:50px;height:50px;border-radius:8px;object-fit:cover}
.cart-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:none}
.cart-overlay.active{display:block}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
<h1>📦 DAFTAR PRODUK</h1>
</header>

<div class="container">
<!-- SEARCH + KERANJANG -->
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="cariProduk()">
<button class="btn-keranjang" onclick="toggleCart()">🛒<span class="cart-count" id="cartCount">0</span></button>
</div>

<div class="produk-grid" id="produkGrid"></div>
</div>

<!-- POPUP KERANJANG -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-popup" id="cartPopup">
<h2 style="color:#22c55e;margin-bottom:15px">🛒 Keranjang</h2>
<div id="cartItems"></div>
<button class="btn-beli" style="margin-top:15px" onclick="checkoutWA()">Checkout via WA</button>
<button class="btn-keranjang-add" style="margin-top:8px;background:#ef4444" onclick="kosongkanCart()">Kosongkan</button>
</div>

<!-- NAVBAR BAWAH 6 MENU - OWNER PALING KAN -->
<nav class="bottom-nav">
<a href="index.html" class="nav-item"><div class="nav-icon">🏠</div><span>Beranda</span></a>
<a href="panel.html" class="nav-item active"><div class="nav-icon">📦</div><span>Produk</span></a>
<a href="tentang.html" class="nav-item"><div class="nav-icon">ℹ️</div><span>Tentang</span></a>
<a href="reting.html" class="nav-item"><div class="nav-icon">⭐</div><span>Rating</span></a>
<a href="#" onclick="logoutUser()" class="nav-item"><div class="nav-icon">👤</div><span>Akun</span></a>
<a href="owner.html" class="nav-item"><div class="nav-icon">👑</div><span>Owner</span></a>
</nav>

<script>
let allProduk = [];

// LOAD PRODUK DARI LOCALSTORAGE
function loadProduk(){
  allProduk = JSON.parse(localStorage.getItem('produk') || '[]');
  tampilProduk(allProduk);
  updateCartCount();
}

function tampilProduk(produk){
  let grid = document.getElementById('produkGrid');
  
  if(produk.length === 0){
    grid.innerHTML = '<div class="empty">Produk tidak ditemukan</div>';
    return;
  }
  
  let html = '';
  produk.forEach(p=>{
    html += `<div class="produk-card">
      <img src="${p.foto}" class="produk-img" onerror="this.src='https://via.placeholder.com/250x180/111/22c55e?text=No+Image'">
      ${p.promo ? '<span class="badge-promo">PROMO</span>' : ''}
      <div class="produk-nama">${p.nama}</div>
      <div class="produk-desc">${p.desc || 'Tanpa deskripsi'}</div>
      <div class="produk-harga">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</div>
      
      <!-- JUMLAH PRODUK DI BAWAH HARGA -->
      <div class="qty-group">
        <label>Jumlah:</label>
        <input type="number" id="qty-${p.id}" value="1" min="1" max="99">
      </div>
      
      <button class="btn-keranjang-add" onclick='addToCart(${JSON.stringify(p)}, ${p.id})'>+ Keranjang</button>
      <button class="btn-beli" onclick="beliProduk('${p.nama}')">Beli Sekarang</button>
    </div>`;
  });
  grid.innerHTML = html;
}

// FITUR SEARCH
function cariProduk(){
  let keyword = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allProduk.filter(p => p.nama.toLowerCase().includes(keyword));
  tampilProduk(filtered);
}

// FITUR KERANJANG + JUMLAH
function addToCart(produk, id){
  let qty = parseInt(document.getElementById(`qty-${id}`).value) || 1;
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  let exist = cart.find(c => c.id === produk.id);
  
  if(exist){
    exist.qty += qty;
  } else {
    produk.qty = qty;
    cart.push(produk);
  }
  
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  alert(`✅ ${qty}x ${produk.nama} ditambah ke keranjang!`);
}

function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  let total = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
  document.getElementById('cartCount').textContent = total;
}

function toggleCart(){
  document.getElementById('cartPopup').classList.toggle('active');
  document.getElementById('cartOverlay').classList.toggle('active');
  loadCartItems();
}

function loadCartItems(){
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  let html = '';
  if(cart.length === 0){
    html = '<div style="text-align:center;color:#666;padding:20px">Keranjang kosong</div>';
  } else {
    cart.forEach((p,i)=>{
      html += `<div class="cart-item">
        <img src="${p.foto}" onerror="this.src='https://via.placeholder.com/50'">
        <div style="flex:1">
          <div style="font-weight:700;color:#22c55e;font-size:13px">${p.nama}</div>
          <div style="font-size:12px;color:#fff">${p.qty || 1}x Rp ${parseInt(p.harga).toLocaleString('id-ID')}</div>
        </div>
        <button onclick="hapusCart(${i})" style="background:#ef4444;border:none;color:#fff;padding:5px 8px;border-radius:5px;font-size:12px">X</button>
      </div>`;
    });
  }
  document.getElementById('cartItems').innerHTML = html;
}

function hapusCart(i){
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  cart.splice(i,1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  loadCartItems();
}

function kosongkanCart(){
  localStorage.removeItem('cart');
  updateCartCount();
  loadCartItems();
}

function checkoutWA(){
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  if(cart.length === 0){alert('Keranjang kosong bang!');return}
  let msg = 'Halo bang, saya mau beli:%0A';
  cart.forEach(p=>{msg += `- ${p.nama} x${p.qty || 1} = Rp ${(parseInt(p.harga) * (p.qty || 1)).toLocaleString('id-ID')}%0A`});
  let wa = '628123456789'; // ganti nomor WA lu disini
  window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
}

function beliProduk(nama){
  let wa = '628123456789';
  let msg = encodeURIComponent(`Halo bang, saya mau beli produk: ${nama}`);
  window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
}

function logoutUser(){
  localStorage.removeItem('login');
  localStorage.removeItem('user');
  alert('Logout berhasil!');
  window.location.href = 'index.html';
}

// BINTANG JATUH
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<60;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:0.1});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});

// LOAD SAAT BUKA HALAMAN
loadProduk();
</script>
</body>
  </html>
