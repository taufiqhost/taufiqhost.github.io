<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="titleToko">Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
@keyframes cart-bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* HEADER COMPACT 1 BARIS - LOGO DIHAPUS */
.header-top{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#111;border-bottom:2px solid #22c55e;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.logo{display:none}

/* SEARCH BAR LEBAR PENUH */
.search-box{flex:1;display:flex;align-items:center;background:#1a1a1a;border:2px solid #333;border-radius:20px;padding:6px 12px;transition:0.3s;height:38px}
.search-box:focus-within{border-color:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.3)}
.search-box input{flex:1;background:transparent;border:none;outline:none;color:#e5e7eb;font-size:13px}
.search-box input::placeholder{color:#666}
.search-icon{font-size:16px;color:#666;margin-right:6px}
.voice-icon,.camera-icon{font-size:18px;color:#9ca3af;margin-left:8px;cursor:pointer;transition:0.3s}
.voice-icon:hover,.camera-icon:hover{color:#22c55e;transform:scale(1.2)}

/* KERANJANG KECIL */
.cart-btn{position:relative;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;padding:8px 10px;border-radius:10px;font-weight:700;cursor:pointer;border:none;font-size:18px;transition:0.3s;box-shadow:0 4px 10px rgba(34,197,94,0.3)}
.cart-count{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:800;border:2px solid #fff;box-shadow:0 0 8px rgba(239,68,68,0.9);z-index:999}

.container{max-width:800px;margin:0 auto;padding:20px 15px;position:relative;z-index:1}
h2{color:#22c55e;font-size:24px;margin-bottom:20px;text-align:center;animation:fadeInUp 0.6s}
.section{margin-top:40px}

.product-card{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);border-radius:12px;padding:15px;margin-bottom:12px;border:1px solid #222;display:flex;justify-content:space-between;align-items:center;gap:12px;animation:fadeInUp 0.5s;transition:0.4s;position:relative}
.product-card:hover{border-color:#22c55e;transform:translateY(-3px)}
.product-name{font-weight:600;font-size:15px;color:#f3f4f6;flex:1}
.product-price{color:#22c55e;font-weight:bold;font-size:16px;white-space:nowrap;margin-right:8px}
.btn-group{display:flex;gap:6px;align-items:center}
.btn{padding:6px 14px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;border-radius:6px;text-decoration:none;font-weight:700;font-size:12px;white-space:nowrap;cursor:pointer;border:none;transition:0.3s}
.btn:hover{transform:scale(1.08)}
.btn-cart{background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);color:#fff}

.unli .product-name,.unli .product-price{color:#fbbf24}
.unli{border-color:#ef4444 !important}
.badge{position:absolute;top:-12px;right:12px;background:#ef4444;color:#fff;padding:4px 10px;border-radius:15px;font-size:10px;font-weight:800;animation:cart-bounce 2s infinite;z-index:10;border:2px solid #fff}

/* MODAL KERANJANG */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);border:2px solid #22c55e;border-radius:15px;padding:20px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.modal-header h3{color:#22c55e;font-size:20px}
.close-btn{background:none;border:none;color:#ef4444;font-size:26px;cursor:pointer}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #222;gap:8px;font-size:14px}
.remove-btn{background:#ef4444;color:#fff;border:none;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px}
.cart-total{margin-top:15px;padding-top:12px;border-top:2px solid #22c55e;text-align:right;font-size:18px;color:#22c55e;font-weight:700}
.checkout-btn{width:100%;margin-top:12px;padding:12px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer}

@media(max-width:600px){
  .search-box input{font-size:12px}
  .voice-icon,.camera-icon{font-size:16px;margin-left:6px}
  .product-card{flex-wrap:wrap}
  .btn-group{width:100%;justify-content:flex-end;margin-top:5px}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<header class="header-top">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Cari produk... contoh: RAM 4GB" onkeyup="searchProduk()">
    <span class="voice-icon" onclick="alert('Fitur voice butuh API bang 😅')">🎤</span>
    <span class="camera-icon" onclick="alert('Fitur kamera butuh AI bang 😅')">📷</span>
  </div>
  
  <button class="cart-btn" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></button>
</header>

<div class="container">
<div id="panel" class="section"><h2>HARGA PANEL</h2><div id="listPanel"></div></div>
<div id="titel" class="section"><h2>TITEL PANEL</h2><div id="listTitel"></div></div>
<div id="scbot" class="section"><h2>SC BOT WHATSAPP</h2><div id="listScbot"></div></div>
</div>

<!-- MODAL KERANJANG -->
<div class="modal" id="cartModal">
<div class="modal-content">
<div class="modal-header">
<h3>🛒 Keranjang Belanja</h3>
<button class="close-btn" onclick="closeCart()">×</button>
</div>
<div id="cartItems"></div>
<div class="cart-total" id="cartTotal">Total: Rp0</div>
<button class="checkout-btn" onclick="checkout()">Checkout via WhatsApp</button>
</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let setting = JSON.parse(localStorage.getItem('tokoSetting')) || {namaToko:'Panel', noWa:'6287785037018'};

// LOAD SETTING
document.getElementById('titleToko').textContent = setting.namaToko;

// DEFAULT PRODUK LENGKAP
function loadProduk(){
  let produk = JSON.parse(localStorage.getItem('produkList')) || [];
  
  if(produk.length === 0){
    produk = [
      {id:1,nama:'RAM 1GB Unlimited',harga:1000,kategori:'panel',badge:'tidak'},
      {id:2,nama:'RAM 2GB Unlimited',harga:2000,kategori:'panel',badge:'tidak'},
      {id:3,nama:'RAM 3GB Unlimited',harga:3000,kategori:'panel',badge:'tidak'},
      {id:4,nama:'RAM 4GB Unlimited',harga:4000,kategori:'panel',badge:'tidak'},
      {id:5,nama:'RAM 5GB Unlimited',harga:5000,kategori:'panel',badge:'tidak'},
      {id:6,nama:'RAM 6GB Unlimited',harga:6000,kategori:'panel',badge:'tidak'},
      {id:7,nama:'RAM 7GB Unlimited',harga:7000,kategori:'panel',badge:'tidak'},
      {id:8,nama:'RAM 8GB Unlimited',harga:8000,kategori:'panel',badge:'tidak'},
      {id:9,nama:'UNLIMITED',harga:5000,kategori:'panel',badge:'ya'},
      {id:10,nama:'TITEL DEV',harga:20000,kategori:'titel',badge:'tidak'},
      {id:11,nama:'TITEL OWNER',harga:15000,kategori:'titel',badge:'tidak'},
      {id:12,nama:'TITEL PATNER',harga:10000,kategori:'titel',badge:'tidak'},
      {id:13,nama:'TITEL ADMIN',harga:7000,kategori:'titel',badge:'tidak'},
      {id:14,nama:'TITEL RESELLER',harga:3000,kategori:'titel',badge:'tidak'},
      {id:15,nama:'SC BOT V1 SIMPLE',harga:15000,kategori:'scbot',badge:'tidak'},
      {id:16,nama:'SC BOT V2 FULL',harga:30000,kategori:'scbot',badge:'tidak'},
      {id:17,nama:'SC BOT V3 PREMIUM',harga:50000,kategori:'scbot',badge:'ya'}
    ];
  }
  
  let htmlPanel = '', htmlTitel = '', htmlScbot = '';
  
  produk.forEach(p => {
    let card = `<div class="product-card ${p.badge==='ya'?'unli':''}">
      ${p.badge==='ya'?'<div class="badge">🔥 3 SLOT</div>':''}
      <span class="product-name">${p.nama}</span>
      <div class="btn-group">
        <span class="product-price">Rp${Number(p.harga).toLocaleString('id-ID')}</span>
        <button class="btn btn-cart" onclick="addToCart('${p.nama}', ${p.harga})">+ Keranjang</button>
        <a href="https://wa.me/${setting.noWa}?text=Order%20${encodeURIComponent(p.nama)}" class="btn" target="_blank">Order</a>
      </div>
    </div>`;
    
    if(p.kategori==='panel') htmlPanel += card;
    if(p.kategori==='titel') htmlTitel += card;
    if(p.kategori==='scbot') htmlScbot += card;
  });
  
  document.getElementById('listPanel').innerHTML = htmlPanel;
  document.getElementById('listTitel').innerHTML = htmlTitel;
  document.getElementById('listScbot').innerHTML = htmlScbot;
}

loadProduk();

// FUNGSI SEARCH
function searchProduk(){
  let keyword = document.getElementById('searchInput').value.toLowerCase();
  let cards = document.querySelectorAll('.product-card');
  
  cards.forEach(card => {
    let nama = card.querySelector('.product-name').textContent.toLowerCase();
    if(nama.includes(keyword)){
      card.style.display = 'flex';
      card.style.animation = 'fadeInUp 0.3s';
    } else {
      card.style.display = 'none';
    }
  });
}

function addToCart(name, price){
  cart.push({name, price});
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount(){
  document.getElementById('cartCount').textContent = cart.length;
}

function openCart(){
  document.getElementById('cartModal').classList.add('active');
  renderCart();
}

function closeCart(){
  document.getElementById('cartModal').classList.remove('active');
}

function renderCart(){
  const cartItems = document.getElementById('cartItems');
  if(cart.length === 0){
    cartItems.innerHTML = '<div style="text-align:center;color:#666;padding:20px">Keranjang kosong 😅</div>';
    document.getElementById('cartTotal').textContent = 'Total: Rp0';
    return;
  }
  
  let html = '';
  let total = 0;
  cart.forEach((item, index) => {
    html += `<div class="cart-item">
      <span>${item.name}</span>
      <span>Rp${item.price.toLocaleString('id-ID')}</span>
      <button class="remove-btn" onclick="removeFromCart(${index})">Hapus</button>
    </div>`;
    total += item.price;
  });
  cartItems.innerHTML = html;
  document.getElementById('cartTotal').textContent = `Total: Rp${total.toLocaleString('id-ID')}`;
}

function removeFromCart(index){
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  renderCart();
}

function checkout(){
  if(cart.length === 0){
    alert('Keranjang masih kosong bang!');
    return;
  }
  
  let message = `Halo, saya mau order:\n\n`;
  let total = 0;
  cart.forEach(item => {
    message += `- ${item.name} : Rp${item.price.toLocaleString('id-ID')}\n`;
    total += item.price;
  });
  message += `\nTotal: Rp${total.toLocaleString('id-ID')}`;
  
  window.open(`https://wa.me/${setting.noWa}?text=${encodeURIComponent(message)}`, '_blank');
  cart = [];
  localStorage.removeItem('cart');
  updateCartCount();
  closeCart();
}

updateCartCount();

// BINTANG JATUH
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<50;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:Math.random()*0.3-0.15});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
</script>
</body>
      </html>
