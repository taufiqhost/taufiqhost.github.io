<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding-bottom:70px}
header{padding:20px;text-align:center;border-bottom:2px solid #22c55e}
header h1{color:#22c55e;font-size:22px;text-shadow:0 0 10px #22c55e}
.search-box{padding:15px;display:flex;gap:10px}
.search-box input{flex:1;padding:12px;background:#111;border:1px solid #333;border-radius:8px;color:#e5e7eb;outline:none}
.search-box input:focus{border-color:#22c55e}
.cart-btn{padding:12px 15px;background:#22c55e;border:none;border-radius:8px;position:relative;cursor:pointer}
.cart-badge{position:absolute;top:-5px;right:-5px;background:red;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center}

.produk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px}
.card{background:#111;border:1px solid #222;border-radius:12px;overflow:hidden;text-align:left;transition:0.2s}
.card:hover{border-color:#22c55e}
.card img{width:100%;height:120px;object-fit:cover;background:#1a1a1a}
.card-body{padding:12px}
.card h3{color:#22c55e;font-size:14px;margin-bottom:4px}
.card p{color:#9ca3af;font-size:12px;margin-bottom:8px}
.card .harga{font-size:16px;font-weight:700;margin-bottom:8px;color:#fff}
.jumlah{display:flex;align-items:center;gap:5px;margin-bottom:8px;font-size:12px}
.jumlah input{width:50px;padding:5px;background:#0a0a0a;border:1px solid #333;border-radius:5px;color:#e5e7eb;text-align:center}
.btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:5px;transition:0.2s}
.btn-cart{background:#444;color:#e5e7eb}
.btn-cart:hover{background:#555}
.btn-buy{background:#22c55e;color:#000}
.btn-buy:hover{background:#16a34a}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1;cursor:pointer}
.nav-item.active{color:#22c55e;font-weight:700}
.nav-icon{font-size:20px;margin-bottom:2px}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:#9ca3af}

/* MODAL KERANJANG */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:10000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-box{background:#111;border:2px solid #22c55e;border-radius:12px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;padding:20px}
.modal-box h3{color:#22c55e;margin-bottom:15px;text-align:center}
.cart-item{display:flex;gap:10px;padding:10px;border-bottom:1px solid #222}
.cart-item img{width:50px;height:50px;object-fit:cover;border-radius:6px}
.cart-info{flex:1;font-size:12px}
.del-cart{background:#dc2626;border:none;color:#fff;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:11px}
.total{margin-top:15px;padding-top:15px;border-top:2px solid #22c55e;font-size:16px;font-weight:700;color:#22c55e}
.close-btn{width:100%;padding:12px;background:#444;color:#fff;border:none;border-radius:8px;margin-top:10px;cursor:pointer}
</style>
</head>
<body>

<header>
<h1>📦 DAFTAR PRODUK</h1>
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Cari produk...">
<button class="cart-btn" onclick="bukaCart()">🛒<span class="cart-badge" id="cartCount">0</span></button>
</div>

<div class="produk-grid" id="produkGrid"></div>

<nav class="bottom-nav">
<a href="index.html" class="nav-item"><div class="nav-icon">🏠</div><span>Beranda</span></a>
<a href="panel.html" class="nav-item active"><div class="nav-icon">📦</div><span>Produk</span></a>
<a href="tentang.html" class="nav-item"><div class="nav-icon">ℹ️</div><span>Tentang</span></a>
<a href="reting.html" class="nav-item"><div class="nav-icon">⭐</div><span>Rating</span></a>
<a href="#" onclick="tampilAkun()" class="nav-item"><div class="nav-icon">👤</div><span>Akun</span></a>
<div onclick="alert('Login owner di menu 👑 index.html bang')" class="nav-item"><div class="nav-icon">👑</div><span>Owner</span></div>
</nav>

<!-- MODAL KERANJANG -->
<div class="modal" id="modalCart">
<div class="modal-box">
<h3>🛒 Keranjang Kamu</h3>
<div id="cartList"></div>
<div class="total" id="cartTotal">Total: Rp 0</div>
<button class="btn btn-buy" onclick="checkoutWA()">Checkout via WhatsApp</button>
<button class="close-btn" onclick="tutupCart()">Tutup</button>
</div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('userLogin') || '{}');
let cart = JSON.parse(localStorage.getItem('cart') || '[]');

const imgDefault = "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Pterodactylus_kielcani.svg/320px-Pterodactylus_kielcani.svg.png";

// PRODUK DEFAULT 2 BIJI SESUAI SS AWAL
const produkDefault = [
  {id: 1, nama: "PANEL RAM 1GB", desc: "Tanpa deskripsi", harga: 1000, img: imgDefault},
  {id: 2, nama: "PANEL RAM 2GB", desc: "Tanpa deskripsi", harga: 2000, img: imgDefault}
];

function loadProduk(){
  let produk = JSON.parse(localStorage.getItem('produk'));
  if(!produk || produk.length === 0){
    localStorage.setItem('produk', JSON.stringify(produkDefault));
    produk = produkDefault;
  }
  return produk;
}

let produkList = loadProduk();

function renderProduk(list = produkList){
  const grid = document.getElementById('produkGrid');
  if(list.length === 0){
    grid.innerHTML = '<div class="empty">Produk kosong bang 😅</div>';
    return;
  }
  
  grid.innerHTML = list.map(p => `
    <div class="card">
      <img src="${p.img}" alt="${p.nama}" onerror="this.src='${imgDefault}'">
      <div class="card-body">
        <h3>${p.nama}</h3>
        <p>${p.desc}</p>
        <div class="harga">Rp ${p.harga.toLocaleString('id-ID')}</div>
        <div class="jumlah">Jumlah: <input type="number" id="qty${p.id}" value="1" min="1"></div>
        <button class="btn btn-cart" onclick="addCart(${p.id})">+ Keranjang</button>
        <button class="btn btn-buy" onclick="waOrder(${p.id})">Beli Sekarang</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('searchInput').addEventListener('input', e => {
  let keyword = e.target.value.toLowerCase();
  let hasil = produkList.filter(p => p.nama.toLowerCase().includes(keyword));
  renderProduk(hasil);
});

// FUNGSI KERANJANG BENERAN
function addCart(id){
  let qty = parseInt(document.getElementById('qty'+id).value);
  let produk = produkList.find(p => p.id === id);
  
  let exist = cart.find(c => c.id === id);
  if(exist){
    exist.qty += qty;
  } else {
    cart.push({...produk, qty});
  }
  
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  alert(`✅ ${produk.nama} x${qty} masuk keranjang`);
}

function bukaCart(){
  document.getElementById('modalCart').classList.add('active');
  renderCart();
}

function tutupCart(){
  document.getElementById('modalCart').classList.remove('active');
}

function renderCart(){
  if(cart.length === 0){
    document.getElementById('cartList').innerHTML = '<p style="text-align:center;color:#666">Keranjang kosong</p>';
    document.getElementById('cartTotal').textContent = 'Total: Rp 0';
    return;
  }
  
  let total = 0;
  document.getElementById('cartList').innerHTML = cart.map((c,i) => {
    total += c.harga * c.qty;
    return `
      <div class="cart-item">
        <img src="${c.img}" onerror="this.src='${imgDefault}'">
        <div class="cart-info">
          <b style="color:#22c55e">${c.nama}</b><br>
          Rp ${c.harga.toLocaleString('id-ID')} x ${c.qty}
        </div>
        <button class="del-cart" onclick="delCart(${i})">Hapus</button>
      </div>
    `;
  }).join('');
  
  document.getElementById('cartTotal').textContent = `Total: Rp ${total.toLocaleString('id-ID')}`;
}

function delCart(i){
  cart.splice(i,1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  renderCart();
}

function checkoutWA(){
  if(cart.length === 0) return alert('Keranjang kosong bang');
  
  let no = '6287785037018';
  let msg = 'Halo bang, mau order:\n\n';
  let total = 0;
  
  cart.forEach(c => {
    msg += `${c.nama} x${c.qty} = Rp ${(c.harga*c.qty).toLocaleString('id-ID')}\n`;
    total += c.harga * c.qty;
  });
  
  msg += `\nTotal: Rp ${total.toLocaleString('id-ID')}`;
  window.open(`https://wa.me/${no}?text=${encodeURIComponent(msg)}`,'_blank');
  
  cart = [];
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  tutupCart();
  alert('✅ Order dikirim ke WA bang');
}

function waOrder(id){
  let qty = parseInt(document.getElementById('qty'+id).value);
  let produk = produkList.find(p => p.id === id);
  let no = '6287785037018';
  let total = produk.harga * qty;
  let msg = `Halo bang, mau order:\n${produk.nama} x${qty}\nTotal: Rp${total.toLocaleString('id-ID')}`;
  window.open(`https://wa.me/${no}?text=${encodeURIComponent(msg)}`,'_blank');
}

function updateCartCount(){
  document.getElementById('cartCount').textContent = cart.reduce((a,b)=>a+b.qty,0);
}

function tampilAkun(){
  if(!user.nama) return alert('Silakan daftar dulu bang');
  alert(`👤 DATA AKUN KAMU\nNama: ${user.nama}\nWhatsApp: ${user.wa}\nRole: ${user.role}`);
}

renderProduk();
updateCartCount();
</script>

</body>
                                                 </html>
