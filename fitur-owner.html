<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitur Owner - Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding:15px}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
@keyframes glow{0%,100%{text-shadow:0 0 10px #22c55e}50%{text-shadow:0 0 20px #22c55e}}

.container{max-width:700px;margin:0 auto;position:relative;z-index:1}
h1{color:#22c55e;text-align:center;margin-bottom:20px;font-size:22px;animation:glow 2s infinite}

/* BOX LOGIN */
.lock-box{background:#111;border:2px solid #22c55e;border-radius:15px;padding:40px;max-width:420px;margin:100px auto;text-align:center;box-shadow:0 0 30px rgba(34,197,94,0.3)}
.lock-icon{font-size:60px;margin-bottom:20px}
.lock-box p{color:#9ca3af;margin-bottom:25px;font-size:14px}
input{width:100%;padding:12px;background:#1a1a1a;border:2px solid #333;border-radius:8px;color:#e5e7eb;margin-bottom:15px;font-size:15px}
input:focus{border-color:#22c55e;outline:none}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;border:none;border-radius:8px;font-weight:800;font-size:16px;cursor:pointer;transition:0.3s}
.btn:hover{transform:scale(1.03)}
.btn-small{padding:5px 10px;font-size:11px;width:auto;margin-right:4px}
.btn-danger{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff}
.error{color:#ef4444;text-align:center;margin-top:10px;font-size:13px;display:none}

/* PANEL OWNER */
.hidden{display:none}
.owner-box{background:#111;border:2px solid #22c55e;border-radius:12px;padding:20px;margin-bottom:15px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px}
th,td{padding:8px;text-align:left;border-bottom:1px solid #333}
th{background:#1a1a1a;color:#22c55e;font-size:12px}
.badge{padding:3px 6px;border-radius:5px;font-size:10px;font-weight:700}
.badge-ya{background:#ef4444;color:#fff}
.badge-tidak{background:#666;color:#fff}
.logout-btn{float:right;background:#ef4444;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}table{font-size:11px}}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="container">
<h1>👑 FITUR OWNER</h1>

<!-- 1. HALAMAN KUNCI -->
<div class="lock-box" id="lockBox">
<div class="lock-icon">🔒</div>
<h2 style="color:#22c55e;margin-bottom:10px;font-size:20px">HALAMAN TERKUNCI</h2>
<p>Masukkan Username & Password untuk akses panel owner</p>
<input type="text" id="user" placeholder="Username" autocomplete="off">
<input type="password" id="pass" placeholder="Password">
<button class="btn" onclick="bukaKunci()">BUKA AKSES</button>
<div class="error" id="errMsg">Username atau Password salah!</div>
</div>

<!-- 2. PANEL OWNER - MUNCUL SETELAH LOGIN -->
<div class="hidden" id="panelOwner">
<button class="logout-btn" onclick="logout()">Logout</button>

<div class="owner-box">
<h2 style="color:#22c55e;margin-bottom:15px;font-size:16px">⚙️ Setting Toko</h2>
<div class="grid-2">
<input type="text" id="namaToko" placeholder="Nama Toko">
<input type="text" id="noWa" placeholder="No WA 62xxx">
</div>
<button class="btn" onclick="saveSetting()">SIMPAN SETTING</button>
</div>

<div class="owner-box">
<h2 style="color:#22c55e;margin-bottom:15px;font-size:16px">📦 Tambah Produk</h2>
<div class="grid-2">
<input type="text" id="namaProduk" placeholder="Nama: RAM 4GB">
<input type="number" id="hargaProduk" placeholder="Harga: 4000">
<select id="kategoriProduk" style="width:100%;padding:10px;background:#1a1a1a;border:2px solid #333;border-radius:8px;color:#e5e7eb">
<option value="panel">Panel</option>
<option value="titel">Titel</option>
<option value="scbot">SC Bot</option>
</select>
<select id="badgeProduk" style="width:100%;padding:10px;background:#1a1a1a;border:2px solid #333;border-radius:8px;color:#e5e7eb">
<option value="tidak">Badge: Tidak</option>
<option value="ya">Badge: Ya</option>
</select>
</div>
<button class="btn" onclick="tambahProduk()">TAMBAH PRODUK</button>
</div>

<div class="owner-box">
<h2 style="color:#22c55e;margin-bottom:12px;font-size:16px">📋 Daftar Produk</h2>
<table>
<thead>
<tr><th>Nama</th><th>Harga</th><th>Kat</th><th>Badge</th><th>Aksi</th></tr>
</thead>
<tbody id="listProduk"></tbody>
</table>
</div>

<div class="owner-box">
<h2 style="color:#22c55e;margin-bottom:12px;font-size:16px">📥 Riwayat Pesanan</h2>
<table>
<thead>
<tr><th>Waktu</th><th>Produk</th><th>Total</th></tr>
</thead>
<tbody id="listPesanan"></tbody>
</table>
</div>
</div>
</div>

<script>
// LOGIN OWNER: admin / admin123
const LOGIN = {user: 'admin', pass: 'admin123'};

let produkList = JSON.parse(localStorage.getItem('produkList')) || [];
let setting = JSON.parse(localStorage.getItem('tokoSetting')) || {namaToko:'Taufiq Store', noWa:'6287785037018'};

function bukaKunci(){
  let u = document.getElementById('user').value;
  let p = document.getElementById('pass').value;
  let err = document.getElementById('errMsg');
  
  if(u === LOGIN.user && p === LOGIN.pass){
    localStorage.setItem('ownerAkses', 'true');
    document.getElementById('lockBox').classList.add('hidden');
    document.getElementById('panelOwner').classList.remove('hidden');
    loadSetting();
    loadProdukTable();
    loadPesanan();
    err.style.display = 'none';
  } else {
    err.style.display = 'block';
  }
}

// AUTO LOGIN
window.onload = function(){
  if(localStorage.getItem('ownerAkses') === 'true'){
    document.getElementById('lockBox').classList.add('hidden');
    document.getElementById('panelOwner').classList.remove('hidden');
    loadSetting();
    loadProdukTable();
    loadPesanan();
  }
}

function logout(){
  localStorage.removeItem('ownerAkses');
  document.getElementById('panelOwner').classList.add('hidden');
  document.getElementById('lockBox').classList.remove('hidden');
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
}

function loadSetting(){
  document.getElementById('namaToko').value = setting.namaToko;
  document.getElementById('noWa').value = setting.noWa;
}

function saveSetting(){
  setting.namaToko = document.getElementById('namaToko').value;
  setting.noWa = document.getElementById('noWa').value;
  localStorage.setItem('tokoSetting', JSON.stringify(setting));
  alert('Setting tersimpan! Refresh panel.html biar berubah');
}

function tambahProduk(){
  let nama = document.getElementById('namaProduk').value;
  let harga = document.getElementById('hargaProduk').value;
  let kategori = document.getElementById('kategoriProduk').value;
  let badge = document.getElementById('badgeProduk').value;
  
  if(!nama || !harga){
    alert('Nama & harga wajib diisi!');
    return;
  }
  
  let id = Date.now();
  produkList.push({id, nama, harga: Number(harga), kategori, badge});
  localStorage.setItem('produkList', JSON.stringify(produkList));
  
  document.getElementById('namaProduk').value = '';
  document.getElementById('hargaProduk').value = '';
  loadProdukTable();
  alert('Produk ditambah!');
}

function hapusProduk(id){
  if(confirm('Hapus produk ini?')){
    produkList = produkList.filter(p => p.id !== id);
    localStorage.setItem('produkList', JSON.stringify(produkList));
    loadProdukTable();
  }
}

function loadProdukTable(){
  let html = '';
  produkList.forEach(p => {
    html += `<tr>
      <td>${p.nama}</td>
      <td>Rp${Number(p.harga).toLocaleString('id-ID')}</td>
      <td>${p.kategori}</td>
      <td><span class="badge badge-${p.badge}">${p.badge.toUpperCase()}</span></td>
      <td><button class="btn btn-small btn-danger" onclick="hapusProduk(${p.id})">Hapus</button></td>
    </tr>`;
  });
  document.getElementById('listProduk').innerHTML = html || '<tr><td colspan="5" style="text-align:center;color:#666">Belum ada produk</td></tr>';
}

function loadPesanan(){
  let pesanan = JSON.parse(localStorage.getItem('pesananList')) || [];
  let html = '';
  pesanan.slice().reverse().forEach(p => {
    let items = p.items.map(i => i.name).join(', ');
    let waktu = new Date(p.waktu).toLocaleString('id-ID');
    html += `<tr>
      <td>${waktu}</td>
      <td>${items}</td>
      <td>Rp${Number(p.total).toLocaleString('id-ID')}</td>
    </tr>`;
  });
  document.getElementById('listPesanan').innerHTML = html || '<tr><td colspan="3" style="text-align:center;color:#666">Belum ada pesanan</td></tr>';
}

document.getElementById('pass').addEventListener('keypress', e => {
  if(e.key === 'Enter') bukaKunci();
});

// Bintang
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<50;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:Math.random()*0.3-0.15});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
</script>
</body>
  </html>
