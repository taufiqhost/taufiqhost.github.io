<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taufiq Store</title>
  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
      padding: 40px 20px;
    }
    h1 { text-align: center; font-size: 42px; margin-bottom: 5px; }
    p.sub { text-align: center; color: #aaa; margin-bottom: 50px; font-size: 18px; }
    
    .produk {
      background: #111;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 25px;
      margin: 25px auto;
      max-width: 480px;
      text-align: center;
    }
    .produk h3 { margin: 0 0 12px 0; font-size: 26px; }
    .produk p { color: #ccc; margin: 12px 0; font-size: 16px; }
    .harga { color: #4ade80; font-size: 28px; font-weight: bold; margin: 18px 0; }
    
    .btn {
      display: inline-block;
      padding: 14px 35px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 17px;
    }
    .btn:hover { background: #20b954; }
    
    .kontak {
      text-align: center;
      margin-top: 70px;
      padding-top: 40px;
      border-top: 1px solid #333;
    }
    .kontak h2 { font-size: 30px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>Taufiq Store</h1>
  <p class="sub">Produk terbaik, harga bersahabat 🔥</p>
  
  <!-- PRODUK 1 - GANTI INI -->
  <div class="produk">
    <h3>Panel 4GB</h3>
    <p>Buat server Minecraft. Anti lag, support plugin</p>
    <div class="harga">Rp 25.000</div>
    <a href="https://wa.me/6287785037018?text=Halo%20bang%20mau%20order%20Panel%204GB" class="btn">Order via WA</a>
  </div>

  <!-- PRODUK 2 - GANTI INI -->
  <div class="produk">
    <h3>VPS 2 Core</h3>
    <p>Cocok buat bot WA, bot Discord, dll</p>
    <div class="harga">Rp 50.000</div>
    <a href="https://wa.me/6287785037018?text=Halo%20bang%20mau%20order%20VPS%202%20Core" class="btn">Order via WA</a>
  </div>

  <!-- KONTAK -->
  <div class="kontak">
    <h2>Butuh Bantuan?</h2>
    <p>Chat aku langsung, fast respon</p>
    <a href="https://wa.me/6287785037018" class="btn">Chat Sekarang</a>
  </div>
</body>
</html>
