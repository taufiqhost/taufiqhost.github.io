<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Owner - Taufiq Store</title>

<script>
if(localStorage.getItem('ownerLogin')!== 'true'){
  alert('Silakan login owner dulu!');
  window.location.href = 'index.html';
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding-bottom:80px;animation:fadeIn 0.5s}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

@keyframes glow{0%,100%{text-shadow:0 0 5px #22c55e,0 0 10px #22c55e}50%{text-shadow:0 0 20px #22c55e,0 0 30px #22c55e}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

header{background:#111;border-bottom:3px solid #22c55e;padding:25px;text-align:center;position:sticky;top:0;z-index:10}
header h1{color:#22c55e;font-size:26px;font-weight:900;letter-spacing:2px;animation:glow 2s infinite}

.container{max-width:1000px;margin:20px auto;padding:0 15px;position:relative;z-index:1}

.box{background:#111;border:2px solid #222;border-radius:15px;padding:25px;margin-bottom:20px;animation:fadeIn 0.6s}
.box:hover{border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,0.2)}
.box h2{color:#22c55e;font-size:20px;margin-bottom:15px;display:flex;align-items:center;gap:10px}

/* STATISTIK - UKURAN DIKECILIN DIKIT DOANG */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:#0a0a0a;border:2px solid #333;border-radius:12px;padding:15px;text-align:center;transition:0.3s}
.stat-card:hover{border-color:#22c55e;transform:translateY(-3px)}
.stat-number{font-size:26px;font-weight:900;color:#22c55e;margin-bottom:3px}
.stat-label{color:#9ca3af;font-size:12px}

/* FORM TAMBAH PRODUK */
.form-group{margin-bottom:15px}
.form-group label{display:block;color:#22c55e;font-weight:600;margin-bottom:6px;font-size:14px}
.form-group input,.form-group textarea{width:100%;padding:12px;background:#0a0a0a;border:2px solid #333;border-radius:8px;color:#e5e7eb;font-size:14px}
.form-group input:focus,.form-group textarea:focus{border-color:#22c55e;outline:none;box-shadow:0 0 10px rgba(34,197,94,0.3)}
.form-group textarea{resize:vertical;min-height:80px}
.checkbox-group{display:flex;align-items:center;gap:10px;margin-top:10px}
.checkbox-group input{width:auto}
.btn{padding:14px 30px;background:#22c55e;color:#000;border:none;border-radius:10px;font-weight:900;font-size:16px;cursor:pointer;width:100%;transition:0.3s}
.btn:hover{background:#16a34a;transform:scale(1.02);box-shadow:0 0 20px rgba(34,197,94,0.5)}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}

/* TABEL USER & PRODUK */
.table-wrapper{overflow-x:auto;margin-top:15px}
table{width:100%;border-collapse:collapse;min-width:500px}
th{background:#0a0a0a;color:#22c55e;padding:12px;text-align:left;border-bottom:2px solid #22c55e;font-size:13px}
td{padding:12px;border-bottom:1px solid #222;font-size:13px}
tr:hover{background:#0a0a0a}
.produk-img{width:50px;height:50px;border-radius:8px;object-fit:cover;border:2px solid #333}
.badge-promo{background:#ef4444;color:#fff;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700}
.btn-hapus{padding:6px 12px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}

/* NAVBAR */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1;cursor:pointer}
.nav-item.active{color:#22c55e;font-weight:700}
.nav-icon{font-size:20px;margin-bottom:2px}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
<h1>👑 DASHBOARD OWNER</h1>
</header>

<div class="container">

<!-- 1. STATISTIK -->
<div class="box">
<h2>📊 Statistik Toko</h2>
<div class="stats" id="statsBox">
<div class="stat-card">
<div class="stat-number" id="totalUser">0</div>
<div class="stat-label">Total User</div>
</div>
<div class="stat-card">
<div class="stat-number" id="totalProduk">0</div>
<div class="stat-label">Total Produk</div>
</div>
<div class="stat-card">
<div class="stat-number" id="onlineUser">1</div>
<div class="stat-label">Online</div>
</div>
<div class="stat-card">
<div class="stat-number" id="uptime">0h</div>
<div class="stat-label">Uptime</div>
</div>
</div>
</div>

<!-- 2. DATA USER TERDAFTAR -->
<div class="box">
<h2>👥 Data User Terdaftar</h2>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>WhatsApp</th>
<th>Role</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>
</div>
</div>

<!-- 3. TAMBAH PRODUK -->
<div class="box">
<h2>➕ Tambah Produk Baru</h2>
<form onsubmit="tambahProduk(event)">
<div class="form-group">
<label>Foto Produk</label>
<input type="file" id="fotoFile" accept="image/*" onchange="previewFoto()">
<input type="text" id="fotoLink" placeholder="Atau paste link foto disini..." style="margin-top:8px">
<img id="previewImg" style="display:none;width:100px;height:100px;object-fit:cover;border-radius:8px;margin-top:10px;border:2px solid #22c55e">
</div>

<div class="form-group">
<label>Nama Produk *</label>
<input type="text" id="namaProduk" placeholder="Contoh: Panel 1GB" required>
</div>

<div class="form-group">
<label>Deskripsi (Opsional)</label>
<textarea id="descProduk" placeholder="Deskripsi produk..."></textarea>
</div>

<div class="form-group">
<label>Harga Produk *</label>
<input type="number" id="hargaProduk" placeholder="Contoh: 1000" required>
</div>

<div class="checkbox-group">
<input type="checkbox" id="promoLabel">
<label for="promoLabel" style="margin:0">Kasih Label PROMO</label>
</div>

<button type="submit" class="btn">SIMPAN PRODUK</button>
</form>
</div>

<!-- 4. DAFTAR PRODUK -->
<div class="box">
<h2>📦 Daftar Produk</h2>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Nama</th>
<th>Harga</th>
<th>Promo</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="produkTable"></tbody>
</table>
</div>
</div>

<button class="btn btn-danger" onclick="logoutOwner()">🚪 KELUAR PANEL</button>
</div>

<!-- NAVBAR BAWAH 6 MENU - OWNER PALING KAN -->
<nav class="bottom-nav">
<a href="index.html" class="nav-item">
<div class="nav-icon">🏠</div>
<span>Beranda</span>
</a>
<a href="panel.html" class="nav-item">
<div class="nav-icon">📦</div>
<span>Produk</span>
</a>
<a href="tentang.html" class="nav-item">
<div class="nav-icon">ℹ️</div>
<span>Tentang</span>
</a>
<a href="reting.html" class="nav-item">
<div class="nav-icon">⭐</div>
<span>Rating</span>
</a>
<a href="#" onclick="logoutOwner()" class="nav-item">
<div class="nav-icon">👤</div>
<span>Akun</span>
</a>
<a href="owner.html" class="nav-item active">
<div class="nav-icon">👑</div>
<span>Owner</span>
</a>
</nav>

<script>
let startTime = Date.now();
let fotoBase64 = '';

// LOAD DATA AWAL
loadStats();
loadUsers();
loadProduk();

// 1. STATISTIK
function loadStats(){
  let users = JSON.parse(localStorage.getItem('users') || '[]');
  let produk = JSON.parse(localStorage.getItem('produk') || '[]');

  document.getElementById('totalUser').textContent = users.length;
  document.getElementById('totalProduk').textContent = produk.length;

  // Uptime
  setInterval(()=>{
    let uptime = Math.floor((Date.now() - startTime) / 1000);
    let h = Math.floor(uptime / 3600);
    let m = Math.floor((uptime % 3600) / 60);
    document.getElementById('uptime').textContent = h + 'h ' + m + 'm';
  }, 1000);
}

// 2. DATA USER
function loadUsers(){
  let users = JSON.parse(localStorage.getItem('users') || '[]');
  let html = '';
  users.forEach((u,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${u.nama}</td>
      <td>${u.wa}</td>
      <td>${u.role}</td>
    </tr>`;
  });
  document.getElementById('userTable').innerHTML = html || '<tr><td colspan="4" style="text-align:center;color:#666">Belum ada user</td></tr>';
}

// 3. PREVIEW FOTO
function previewFoto(){
  let file = document.getElementById('fotoFile').files[0];
  if(file){
    let reader = new FileReader();
    reader.onload = e => {
      fotoBase64 = e.target.result;
      document.getElementById('previewImg').src = fotoBase64;
      document.getElementById('previewImg').style.display = 'block';
      document.getElementById('fotoLink').value = '';
    }
    reader.readAsDataURL(file);
  }
}

// 4. TAMBAH PRODUK
function tambahProduk(e){
  e.preventDefault();

  let nama = document.getElementById('namaProduk').value.trim();
  let desc = document.getElementById('descProduk').value.trim();
  let harga = document.getElementById('hargaProduk').value.trim();
  let promo = document.getElementById('promoLabel').checked;
  let foto = fotoBase64 || document.getElementById('fotoLink').value.trim();

  if(!nama ||!harga ||!foto){
    alert('Nama, Harga, dan Foto wajib diisi bang!');
    return;
  }

  let produk = JSON.parse(localStorage.getItem('produk') || '[]');
  produk.push({
    id: Date.now(),
    nama: nama,
    desc: desc,
    harga: harga,
    foto: foto,
    promo: promo,
    tanggal: new Date().toLocaleDateString('id-ID')
  });

  localStorage.setItem('produk', JSON.stringify(produk));
  alert('✅ Produk berhasil ditambahkan!');

  // Reset form
  document.getElementById('namaProduk').value = '';
  document.getElementById('descProduk').value = '';
  document.getElementById('hargaProduk').value = '';
  document.getElementById('fotoLink').value = '';
  document.getElementById('fotoFile').value = '';
  document.getElementById('promoLabel').checked = false;
  document.getElementById('previewImg').style.display = 'none';
  fotoBase64 = '';

  loadStats();
  loadProduk();
}

// 5. DAFTAR PRODUK
function loadProduk(){
  let produk = JSON.parse(localStorage.getItem('produk') || '[]');
  let html = '';
  produk.forEach(p=>{
    html += `<tr>
      <td><img src="${p.foto}" class="produk-img" onerror="this.src='https://via.placeholder.com/50'"></td>
      <td>${p.nama}</td>
      <td>Rp ${parseInt(p.harga).toLocaleString('id-ID')}</td>
      <td>${p.promo? '<span class="badge-promo">PROMO</span>' : '-'}</td>
      <td><button class="btn-hapus" onclick="hapusProduk(${p.id})">Hapus</button></td>
    </tr>`;
  });
  document.getElementById('produkTable').innerHTML = html || '<tr><td colspan="5" style="text-align:center;color:#666">Belum ada produk</td></tr>';
}

function hapusProduk(id){
  if(confirm('Yakin hapus produk ini?')){
    let produk = JSON.parse(localStorage.getItem('produk') || '[]');
    produk = produk.filter(p => p.id!== id);
    localStorage.setItem('produk', JSON.stringify(produk));
    loadStats();
    loadProduk();
  }
}

function logoutOwner(){
  localStorage.removeItem('ownerLogin');
  alert('Logout berhasil!');
  window.location.href = 'index.html';
}

// BINTANG JATUH
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<60;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:0.1});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
</script>
</body>
  </html>
