<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Panel - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding:15px;padding-bottom:90px}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
@keyframes glow{0%,100%{text-shadow:0 0 10px #22c55e}50%{text-shadow:0 0 20px #22c55e}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

.container{max-width:600px;margin:0 auto;position:relative;z-index:1}
h1{color:#22c55e;text-align:center;margin-bottom:20px;font-size:26px;animation:glow 2s infinite}

/* BOX LOGIN OWNER KAYAK SCREENSHOT LU */
.login-owner-box{background:#0f0f0f;border:2px solid #22c55e;border-radius:15px;padding:30px;box-shadow:0 0 20px rgba(34,197,94,0.3);margin-top:50px}
.login-owner-box h2{color:#22c55e;text-align:center;margin-bottom:25px;font-size:22px;display:flex;align-items:center;justify-content:center;gap:8px}

input{width:100%;padding:14px;background:#1a1a1a;border:2px solid #333;border-radius:10px;color:#e5e7eb;margin-bottom:12px;font-size:15px}
input:focus{border-color:#22c55e;outline:none;box-shadow:0 0 10px rgba(34,197,94,0.3)}
.btn-masuk{width:100%;padding:14px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;border:none;border-radius:10px;font-weight:800;font-size:18px;cursor:pointer;margin-top:5px}
.btn-masuk:hover{transform:scale(1.03);box-shadow:0 0 15px rgba(34,197,94,0.5)}

/* NOTIF WELCOME */
.welcome-notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;padding:15px 25px;border-radius:12px;font-weight:800;font-size:16px;z-index:9999;display:none;animation:pop 0.5s}

.hidden{display:none}
.owner-panel{background:#0f0f0f;border:2px solid #22c55e;border-radius:12px;padding:20px;margin-top:20px}
.owner-panel h3{color:#22c55e;margin-bottom:15px;font-size:18px}
textarea{resize:vertical;min-height:80px}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;border:none;border-radius:8px;font-weight:800;font-size:16px;cursor:pointer}
.btn-small{padding:8px 15px;font-size:13px;width:auto}
.btn-danger{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff}
.success{color:#22c55e;text-align:center;margin-top:12px;display:none;font-weight:700;font-size:14px}

.product-item{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.product-name{color:#22c55e;font-weight:700;margin-bottom:5px;font-size:15px}
.product-desc{color:#d1d5db;font-size:13px;margin-bottom:8px}

/* NAVBAR BAWAH 6 MENU SAMA KAYAK RETING */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #22c55e;display:flex;justify-content:space-around;padding:8px 0;z-index:999}
.nav-item{color:#9ca3af;text-decoration:none;font-size:10px;text-align:center;flex:1;transition:0.3s}
.nav-item.active{color:#22c55e;font-weight:700}
.nav-icon{font-size:22px;display:block;margin-bottom:3px}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="welcome-notif" id="welcomeNotif">Selamat Datang Owner Ganteng 🥰😍</div>

<div class="container">
<h1>⭐ PENILAIAN KEPUASAN</h1>

<!-- LOGIN OWNER -->
<div id="loginOwner" class="login-owner-box">
<h2>🔒 Login FITUR OWNER</h2>
<input type="text" id="userOwner" placeholder="Username" autocomplete="off">
<input type="password" id="passOwner" placeholder="Password">
<button class="btn-masuk" onclick="loginOwner()">MASUK</button>
<p style="color:#666;text-align:center;margin-top:10px;font-size:12px">Default: admin / admin123</p>
</div>

<!-- PANEL OWNER -->
<div class="owner-panel hidden" id="panelOwner">
<button class="btn btn-small btn-danger" style="float:right" onclick="logoutOwner()">Logout</button>
<h3>📊 DASHBOARD OWNER</h3>

<h3 style="margin-top:25px">➕ Tambah Produk</h3>
<input type="text" id="namaProduk" placeholder="Nama Produk - Contoh: Panel 1GB">
<textarea id="descProduk" placeholder="Deskripsi Produk (Opsional)..."></textarea>
<button class="btn" onclick="tambahProduk()">SIMPAN PRODUK</button>
<div class="success" id="suksesProduk">✅ Produk berhasil ditambahkan!</div>

<h3 style="margin-top:25px">📦 Daftar Produk</h3>
<div id="listProdukOwner"></div>
</div>
</div>

<!-- NAVBAR BAWAH 6 MENU -->
<div class="nav-bottom">
<a href="index.html" class="nav-item">
<span class="nav-icon">🏠</span>
Beranda
</a>
<a href="panel.html" class="nav-item">
<span class="nav-icon">📦</span>
Produk
</a>
<a href="about.html" class="nav-item">
<span class="nav-icon">ℹ️</span>
Tentang
</a>
<a href="reting.html" class="nav-item">
<span class="nav-icon">⭐</span>
Reting
</a>
<a href="akun.html" class="nav-item">
<span class="nav-icon">👤</span>
Akun
</a>
<a href="owner.html" class="nav-item active">
<span class="nav-icon">🔒</span>
Owner
</a>
</div>

<script>
// LOGIN OWNER
function loginOwner(){
  let u = document.getElementById('userOwner').value;
  let p = document.getElementById('passOwner').value;
  
  if(u === 'admin' && p === 'admin123'){
    localStorage.setItem('ownerLogin', 'true');
    document.getElementById('loginOwner').classList.add('hidden');
    document.getElementById('panelOwner').classList.remove('hidden');
    
    // NOTIF WELCOME
    let notif = document.getElementById('welcomeNotif');
    notif.style.display = 'block';
    setTimeout(() => notif.style.display = 'none', 3000);
    
    loadProdukOwner();
  } else {
    alert('❌ Username/Password salah!\nDefault: admin / admin123');
  }
}

function logoutOwner(){
  localStorage.removeItem('ownerLogin');
  document.getElementById('panelOwner').classList.add('hidden');
  document.getElementById('loginOwner').classList.remove('hidden');
  document.getElementById('userOwner').value = '';
  document.getElementById('passOwner').value = '';
}

// TAMBAH PRODUK
function tambahProduk(){
  let nama = document.getElementById('namaProduk').value.trim();
  let desc = document.getElementById('descProduk').value.trim();
  
  if(nama === ''){
    alert('Nama produk wajib diisi bang!');
    return;
  }
  
  let produk = {
    id: Date.now(),
    nama: nama,
    desc: desc,
    waktu: new Date().toISOString()
  };
  
  let listProduk = JSON.parse(localStorage.getItem('produkOwner')) || [];
  listProduk.push(produk);
  localStorage.setItem('produkOwner', JSON.stringify(listProduk));
  
  document.getElementById('namaProduk').value = '';
  document.getElementById('descProduk').value = '';
  document.getElementById('suksesProduk').style.display = 'block';
  loadProdukOwner();
  
  setTimeout(() => document.getElementById('suksesProduk').style.display = 'none', 2000);
}

function loadProdukOwner(){
  let listProduk = JSON.parse(localStorage.getItem('produkOwner')) || [];
  let html = '';
  
  if(listProduk.length == 0){
    html = '<div style="color:#666;text-align:center;padding:20px">Belum ada produk ditambahkan</div>';
  } else {
    listProduk.reverse().forEach(p => {
      html += `<div class="product-item">
        <div class="product-name">${p.nama}</div>
        <div class="product-desc">${p.desc || '<i>Tidak ada deskripsi</i>'}</div>
        <button class="btn btn-small btn-danger" style="position:absolute;top:8px;right:8px" onclick="hapusProduk(${p.id})">Hapus</button>
      </div>`;
    });
  }
  document.getElementById('listProdukOwner').innerHTML = html;
}

function hapusProduk(id){
  if(confirm('Hapus produk ini?')){
    let listProduk = JSON.parse(localStorage.getItem('produkOwner')) || [];
    listProduk = listProduk.filter(p => p.id !== id);
    localStorage.setItem('produkOwner', JSON.stringify(listProduk));
    loadProdukOwner();
  }
}

// AUTO LOGIN
window.onload = function(){
  if(localStorage.getItem('ownerLogin') === 'true'){
    document.getElementById('loginOwner').classList.add('hidden');
    document.getElementById('panelOwner').classList.remove('hidden');
    loadProdukOwner();
  }
}

document.getElementById('passOwner').addEventListener('keypress', e => {
  if(e.key === 'Enter') loginOwner();
});

// BINTANG JATUH
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<50;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:Math.random()*0.3-0.15});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
</script>
</body>
  </html>
