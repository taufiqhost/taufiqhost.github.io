<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk - Taufiq Store</title>
<script>
if(!localStorage.getItem('userLogin')){
  window.location.replace('daftar.html');
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding:20px;padding-bottom:90px;overflow-x:hidden}
canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}

header{background:#111;border-bottom:2px solid #22c55e;padding:20px;text-align:center;position:sticky;top:0;z-index:10;margin:-20px -20px 30px -20px}
header h1{font-size:24px;font-weight:700;color:#22c55e}

/* GRID PRODUK */
.produk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.kartu-produk{background:#111;border:2px solid #333;border-radius:15px;overflow:hidden;transition:0.3s;animation:fadeIn 0.5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.kartu-produk:hover{border-color:#22c55e;transform:translateY(-5px);box-shadow:0 5px 20px rgba(34,197,94,0.2)}

.gambar-produk{width:100%;height:140px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.gambar-produk img{width:100%;height:100%;object-fit:cover}

.info-produk{padding:12px}
.nama-produk{font-size:14px;font-weight:700;color:#e5e7eb;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.desk-produk{font-size:11px;color:#9ca3af;margin-bottom:8px;height:30px;overflow:hidden}
.harga-produk{font-size:16px;font-weight:900;color:#22c55e;margin-bottom:8px}
.btn-beli{width:100%;padding:8px;background:#22c55e;color:#000;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
.btn-beli:hover{background:#16a34a}

.label-promo{background:#fbbf24;color:#000;padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700}

.kosong{text-align:center;color:#666;padding:40px 20px}
.kosong-icon{font-size:50px;margin-bottom:10px}

/* NAVBAR BAWAH 6 MENU */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1}
.nav-item.active{color:#22c55e}
.nav-icon{font-size:20px;margin-bottom:2px}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header><h1>📦 DAFTAR PRODUK</h1></header>

<div class="produk-grid" id="listProduk">
<div class="kosong">
<div class="kosong-icon">📦</div>
<p>Belum ada produk<br>Tambah dari Panel Owner</p>
</div>
</div>

<!-- NAVBAR BAWAH 6 MENU -->
<nav class="bottom-nav">
<a href="index.html" class="nav-item">
<div class="nav-icon">🏠</div>
<span>Beranda</span>
</a>
<a href="panel.html" class="nav-item active">
<div class="nav-icon">📦</div>
<span>Produk</span>
</a>
<a href="tentang.html" class="nav-item">
<div class="nav-icon">ℹ️</div>
<span>Tentang</span>
</a>
<a href="reting.html" class="nav-item">
<div class="nav-icon">⭐</div>
<span>Rating</span>
</a>
<a href="#" onclick="tampilAkun()" class="nav-item">
<div class="nav-icon">👤</div>
<span>Akun</span>
</a>
<a href="owner.html" onclick="cekOwner()" class="nav-item">
<div class="nav-icon">👑</div>
<span>Owner</span>
</a>
</nav>

<script>
let user = JSON.parse(localStorage.getItem('userLogin'));

function loadProduk(){
  let produk = JSON.parse(localStorage.getItem('produk')) || [];
  let grid = document.getElementById('listProduk');
  
  if(produk.length === 0){
    grid.innerHTML = `<div class="kosong">
      <div class="kosong-icon">📦</div>
      <p>Belum ada produk<br>Tambah dari Panel Owner</p>
    </div>`;
    return;
  }
  
  let html = '';
  produk.reverse().forEach(p=>{
    let labelHtml = p.label? `<span class="label-promo">${p.label}</span>` : '';
    let fotoHtml = p.foto? `<img src="${p.foto}">` : '📷';
    
    html += `<div class="kartu-produk">
      <div class="gambar-produk">${fotoHtml}</div>
      <div class="info-produk">
        <div class="nama-produk">${p.nama} ${labelHtml}</div>
        <div class="desk-produk">${p.deskripsi || 'Tanpa deskripsi'}</div>
        <div class="harga-produk">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</div>
        <button class="btn-beli" onclick="beliProduk('${p.nama}', '${p.harga}')">Beli Sekarang</button>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

function beliProduk(nama, harga){
  let pesan = `Halo bang, saya mau order:\n\n📦 Produk: ${nama}\n💰 Harga: Rp ${parseInt(harga).toLocaleString('id-ID')}\n\nNama: ${user.nama}\nWA: ${user.wa}`;
  let waOwner = '6281234567890'; // GANTI NO WA OWNER LU DI SINI
  window.open(`https://wa.me/${waOwner}?text=${encodeURIComponent(pesan)}`, '_blank');
}

function tampilAkun(){
  alert(`👤 DATA AKUN KAMU\nNama: ${user.nama}\nWhatsApp: ${user.wa}`);
}

function cekOwner(){
  if(user.role !== 'owner'){
    alert('Akses ditolak! Kamu bukan owner');
    event.preventDefault();
  } else if(localStorage.getItem('ownerLogin') !== 'true'){
    alert('Login owner lewat beranda bang👑');
    event.preventDefault();
    window.location.replace('index.html');
  }
}

// EFEK BINTANG JATUH IJO
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<50;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:Math.random()*0.3-0.15});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});

// Load produk pas buka halaman
loadProduk();
</script>
</body>
  </html>
