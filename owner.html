<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Owner - Taufiq Store</title>
<script>
if(!localStorage.getItem('userLogin')){
  window.location.replace('daftar.html');
}
let user = JSON.parse(localStorage.getItem('userLogin'));
if(user.role!== 'owner'){
  alert('Akses ditolak! Kamu bukan owner');
  window.location.replace('index.html');
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding:20px;padding-bottom:90px;overflow-x:hidden}
canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}

header{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);border-bottom:2px solid #22c55e;padding:25px;text-align:center;position:sticky;top:0;z-index:10;margin:-20px -20px 30px -20px;animation:slideDown 0.5s}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}

.logo{font-size:40px;margin-bottom:5px;animation:spin 3s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

header h1{font-size:24px;font-weight:900;color:#22c55e;margin-bottom:5px}
header p{color:#9ca3af;font-size:13px}

.box{background:#111;border:2px solid #333;border-radius:15px;padding:20px;margin-bottom:20px;animation:fadeIn 0.6s}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.box h2{color:#22c55e;font-size:18px;margin-bottom:15px;display:flex;align-items:center;gap:8px}

/* STATISTIK GRID */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:15px}
.stat-card{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 100%);border:2px solid #22c55e;border-radius:12px;padding:18px;text-align:center;transition:0.3s}
.stat-card:hover{transform:translateY(-5px);box-shadow:0 5px 20px rgba(34,197,94,0.3)}
.stat-card.icon{font-size:32px;margin-bottom:8px}
.stat-card.num{font-size:28px;font-weight:900;color:#22c55e;margin-bottom:3px}
.stat-card.label{font-size:12px;color:#9ca3af}

input,textarea,select{width:100%;padding:12px;background:#0a0a0a;border:2px solid #333;border-radius:8px;color:#e5e7eb;margin-bottom:10px;font-size:14px}
input:focus,textarea:focus,select:focus{border-color:#22c55e;outline:none}
.btn{width:100%;padding:12px;background:#22c55e;color:#000;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;margin-top:5px;transition:0.2s}
.btn:hover{background:#16a34a;transform:scale(1.02)}
.btn.danger{background:#ef4444;color:#fff}
.btn.danger:hover{background:#dc2626}
.btn.kecil{padding:6px 10px;font-size:12px;width:auto}

.user-item,.produk-item{background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:0.2s}
.user-item:hover,.produk-item:hover{border-color:#22c55e;background:#151515}
.user-info b{color:#22c55e}
.user-info p{color:#9ca3af;font-size:12px;margin-top:2px}

.produk-info{flex:1}
.produk-info b{color:#22c55e}
.produk-info p{color:#d1d5db;font-size:12px;margin-top:3px}
.produk-harga{color:#22c55e;font-weight:700;font-size:14px}
.label-promo{background:#fbbf24;color:#000;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-left:5px}

.foto-preview{width:100%;height:150px;background:#0a0a0a;border:2px dashed #333;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;color:#666;overflow:hidden}
.foto-preview img{width:100%;height:100%;object-fit:cover}

.tab-menu{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto}
.tab-btn{padding:10px 15px;background:#0a0a0a;border:2px solid #333;border-radius:8px;color:#9ca3af;font-size:13px;cursor:pointer;white-space:nowrap;transition:0.2s}
.tab-btn.active{background:#22c55e;color:#000;border-color:#22c55e;font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}

/* NAVBAR BAWAH */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #22c55e;display:flex;justify-content:space-around;z-index:9999;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#9ca3af;font-size:10px;flex:1}
.nav-item.active{color:#22c55e}
.nav-icon{font-size:20px;margin-bottom:2px}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
<div class="logo">👑</div>
<h1>PANEL OWNER</h1>
<p>Taufiq Store Dashboard</p>
</header>

<!-- TAB MENU -->
<div class="tab-menu">
<button class="tab-btn active" onclick="bukaTab('statistik')">📊 Statistik</button>
<button class="tab-btn" onclick="bukaTab('user')">👥 Data User</button>
<button class="tab-btn" onclick="bukaTab('produk')">📦 Tambah Produk</button>
<button class="tab-btn" onclick="bukaTab('daftar')">📋 Daftar Produk</button>
</div>

<!-- TAB 1: STATISTIK -->
<div id="statistik" class="tab-content active">
<div class="box">
<h2>📊 Statistik Toko</h2>
<div class="stat-grid">
<div class="stat-card">
<div class="icon">👥</div>
<div class="num" id="totalUser">0</div>
<div class="label">Total User</div>
</div>
<div class="stat-card">
<div class="icon">📦</div>
<div class="num" id="totalProduk">0</div>
<div class="label">Total Produk</div>
</div>
<div class="stat-card">
<div class="icon">🟢</div>
<div class="num" id="online">0</div>
<div class="label">Online Sekarang</div>
</div>
<div class="stat-card">
<div class="icon">⏱️</div>
<div class="num" id="uptime">00:00:00</div>
<div class="label">Uptime</div>
</div>
</div>
<button class="btn danger" onclick="logoutOwner()">🚪 Logout Owner</button>
</div>
</div>

<!-- TAB 2: DATA USER -->
<div id="user" class="tab-content">
<div class="box">
<h2>👥 Data User Terdaftar</h2>
<div id="listUser"></div>
</div>
</div>

<!-- TAB 3: TAMBAH PRODUK -->
<div id="produk" class="tab-content">
<div class="box">
<h2>📦 Tambah Produk Baru</h2>

<div class="foto-preview" id="previewFoto">📷 Preview Foto</div>

<input type="text" id="linkFoto" placeholder="Link Foto Produk (URL)" oninput="previewLink()">
<input type="file" id="fileFoto" accept="image/*" onchange="previewFile()">

<input type="text" id="namaProduk" placeholder="Nama Produk" required>
<textarea id="deskProduk" placeholder="Deskripsi Produk (boleh kosong)" rows="3"></textarea>
<input type="number" id="hargaProduk" placeholder="Harga Produk (angka saja)" required>

<select id="labelPromo">
<option value="">Tanpa Label</option>
<option value="PROMO">🔥 PROMO</option>
<option value="BARU">✨ BARU</option>
<option value="BEST">⭐ BEST SELLER</option>
</select>

<button class="btn" onclick="tambahProduk()">+ Tambah Produk</button>
</div>
</div>

<!-- TAB 4: DAFTAR PRODUK -->
<div id="daftar" class="tab-content">
<div class="box">
<h2>📋 Daftar Produk</h2>
<button class="btn danger" onclick="hapusSemuaProduk()">🗑️ Hapus Semua Produk</button>
<div id="listProduk" style="margin-top:15px"></div>
</div>
</div>

<!-- NAVBAR BAWAH 6 MENU -->
<nav class="bottom-nav">
<a href="index.html" class="nav-item">
<div class="nav-icon">🏠</div>
<span>Beranda</span>
</a>
<a href="panel.html" class="nav-item">
<div class="nav-icon">📦</div>
<span>Produk</span>
</a>
<a href="tentang.html" class="nav-item">
<div class="nav-icon">ℹ️</div>
<span>Tentang</span>
</a>
<a href="reting.html" class="nav-item">
<div class="nav-icon">⭐</div>
<span>Rating</span>
</a>
<a href="owner.html" class="nav-item active">
<div class="nav-icon">👑</div>
<span>Owner</span>
</a>
<a href="#" onclick="showAkun()" class="nav-item">
<div class="nav-icon">👤</div>
<span>Akun</span>
</a>
</nav>

<script>
let startTime = Date.now();

// CEK LOGIN OWNER
if(localStorage.getItem('ownerLogin')!== 'true'){
  // Kalau belum login, tampilkan form login
  document.body.innerHTML = `
  <canvas id="stars"></canvas>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px">
    <div class="box" style="max-width:400px;text-align:center">
      <h1>👑 LOGIN OWNER</h1>
      <p style="color:#9ca3af;font-size:14px;margin:15px 0">Masukkan password owner</p>
      <input type="password" id="passOwner" placeholder="Password owner...">
      <button class="btn" onclick="loginOwner()">Masuk Dashboard</button>
      <a href="index.html" style="display:block;margin-top:15px;color:#22c55e;text-decoration:none">← Kembali</a>
    </div>
  </div>
  <script>
    const PASSWORD_OWNER = "admin123";
    function loginOwner(){
      let pass = document.getElementById('passOwner').value;
      if(pass === PASSWORD_OWNER){
        localStorage.setItem('ownerLogin', 'true');
        alert('Login owner berhasil! Selamat datang di dashboard 👑');
        location.reload();
      } else {
        alert('❌ Password salah bang!');
      }
    }
    document.getElementById('passOwner').addEventListener('keypress', e => {if(e.key==='Enter') loginOwner()});
  <\/script>
  `;
  throw new Error('Stop');
}

// TAB SWITCH
function bukaTab(id){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  if(id === 'statistik') updateStatistik();
  if(id === 'user') loadUser();
  if(id === 'daftar') loadProduk();
}

// STATISTIK
function updateStatistik(){
  let users = JSON.parse(localStorage.getItem('users')) || [];
  let produk = JSON.parse(localStorage.getItem('produk')) || [];

  document.getElementById('totalUser').textContent = users.length;
  document.getElementById('totalProduk').textContent = produk.length;
  document.getElementById('online').textContent = users.filter(u=>u.online).length || Math.floor(users.length * 0.3);
}

// UPTIME
setInterval(()=>{
  let diff = Math.floor((Date.now() - startTime) / 1000);
  let h = String(Math.floor(diff / 3600)).padStart(2,'0');
  let m = String(Math.floor((diff % 3600) / 60)).padStart(2,'0');
  let s = String(diff % 60).padStart(2,'0');
  document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
}, 1000);

// DATA USER
function loadUser(){
  let users = JSON.parse(localStorage.getItem('users')) || [];
  if(users.length === 0){
    document.getElementById('listUser').innerHTML = '<p style="color:#666;text-align:center">Belum ada user terdaftar</p>';
    return;
  }
  let html = '';
  users.forEach(u=>{
    html += `<div class="user-item">
      <div class="user-info">
        <b>${u.nama}</b>
        <p>WA: ${u.wa}</p>
      </div>
      <button class="btn kecil danger" onclick="hapusUser('${u.wa}')">Hapus</button>
    </div>`;
  });
  document.getElementById('listUser').innerHTML = html;
}

function hapusUser(wa){
  if(confirm('Hapus user ini?')){
    let users = JSON.parse(localStorage.getItem('users')) || [];
    users = users.filter(u=>u.wa!== wa);
    localStorage.setItem('users', JSON.stringify(users));
    loadUser();
    updateStatistik();
  }
}

// PREVIEW FOTO
function previewLink(){
  let url = document.getElementById('linkFoto').value;
  if(url){
    document.getElementById('previewFoto').innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='❌ Link error'">`;
    document.getElementById('fileFoto').value = '';
  }
}
function previewFile(){
  let file = document.getElementById('fileFoto').files[0];
  if(file){
    let reader = new FileReader();
    reader.onload = e => {
      document.getElementById('previewFoto').innerHTML = `<img src="${e.target.result}">`;
      document.getElementById('linkFoto').value = '';
    }
    reader.readAsDataURL(file);
  }
}

// TAMBAH PRODUK
function tambahProduk(){
  let nama = document.getElementById('namaProduk').value.trim();
  let harga = document.getElementById('hargaProduk').value;
  if(!nama ||!harga) return alert('Nama & Harga wajib diisi!');

  let foto = document.getElementById('linkFoto').value;
  let file = document.getElementById('fileFoto').files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = e => {
      simpanProduk(nama, e.target.result, harga);
    }
    reader.readAsDataURL(file);
  } else {
    simpanProduk(nama, foto, harga);
  }
}

function simpanProduk(nama, foto, harga){
  let desk = document.getElementById('deskProduk').value;
  let label = document.getElementById('labelPromo').value;

  let produk = JSON.parse(localStorage.getItem('produk')) || [];
  produk.push({
    id: Date.now(),
    nama: nama,
    foto: foto,
    deskripsi: desk,
    harga: harga,
    label: label,
    waktu: new Date().toISOString()
  });
  localStorage.setItem('produk', JSON.stringify(produk));

  document.getElementById('namaProduk').value = '';
  document.getElementById('deskProduk').value = '';
  document.getElementById('hargaProduk').value = '';
  document.getElementById('linkFoto').value = '';
  document.getElementById('fileFoto').value = '';
  document.getElementById('labelPromo').value = '';
  document.getElementById('previewFoto').innerHTML = '📷 Preview Foto';

  alert('✅ Produk berhasil ditambah!');
  updateStatistik();
}

// DAFTAR PRODUK
function loadProduk(){
  let produk = JSON.parse(localStorage.getItem('produk')) || [];
  if(produk.length === 0){
    document.getElementById('listProduk').innerHTML = '<p style="color:#666;text-align:center">Belum ada produk</p>';
    return;
  }
  let html = '';
  produk.reverse().forEach(p=>{
    let labelHtml = p.label? `<span class="label-promo">${p.label}</span>` : '';
    html += `<div class="produk-item">
      <div class="produk-info">
        <b>${p.nama} ${labelHtml}</b>
        <p>${p.deskripsi || 'Tanpa deskripsi'}</p>
        <div class="produk-harga">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</div>
      </div>
      <button class="btn kecil danger" onclick="hapusProduk(${p.id})">Hapus</button>
    </div>`;
  });
  document.getElementById('listProduk').innerHTML = html;
}

function hapusProduk(id){
  if(confirm('Hapus produk ini?')){
    let produk = JSON.parse(localStorage.getItem('produk')) || [];
    produk = produk.filter(p=>p.id!== id);
    localStorage.setItem('produk', JSON.stringify(produk));
    loadProduk();
    updateStatistik();
  }
}

function hapusSemuaProduk(){
  if(confirm('Hapus semua produk?')){
    localStorage.removeItem('produk');
    loadProduk();
    updateStatistik();
  }
}

function logoutOwner(){
  if(confirm('Logout dari panel owner?')){
    localStorage.removeItem('ownerLogin');
    window.location.replace('index.html');
  }
}

function showAkun(){
  alert(`👤 DATA AKUN KAMU\nNama: ${user.nama}\nWhatsApp: ${user.wa}\nRole: ${user.role}`);
}

// BINTANG JATUH EFEK
const c=document.getElementById('stars'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let s=[];for(let i=0;i<60;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,dy:Math.random()*0.5+0.2,dx:Math.random()*0.3-0.15});
function a(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#22c55e';s.forEach(p=>{ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.dy;p.x+=p.dx;if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}});requestAnimationFrame(a)}
a();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});

// Load awal
updateStatistik();
</script>
</body>
  </html>
