<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Taufiq Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#0a0a0a;color:#e5e7eb;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{color:#22c55e;text-align:center;margin-bottom:30px;font-size:28px}
.login-box,.admin-box{background:#111;border:2px solid #22c55e;border-radius:15px;padding:30px;margin-bottom:20px}
input,select{width:100%;padding:12px;background:#1a1a1a;border:2px solid #333;border-radius:8px;color:#e5e7eb;margin-bottom:15px;font-size:15px}
input:focus,select:focus{border-color:#22c55e;outline:none}
.btn{padding:12px 25px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#000;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;width:100%;transition:0.3s}
.btn:hover{transform:scale(1.03)}
.btn-danger{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff;margin-top:10px}
.btn-small{padding:6px 12px;font-size:12px;width:auto;margin-right:5px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #333}
th{background:#1a1a1a;color:#22c55e}
tr:hover{background:#1a1a1a}
.badge{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:700}
.badge-ya{background:#ef4444;color:#fff}
.badge-tidak{background:#666;color:#fff}
.hidden{display:none}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>🔐 PANEL ADMIN TAUFIQ STORE</h1>

<!-- LOGIN BOX -->
<div class="login-box" id="loginBox">
<h2 style="color:#22c55e;margin-bottom:20px;text-align:center">Login Admin</h2>
<input type="password" id="passInput" placeholder="Masukkan Password Admin">
<button class="btn" onclick="login()">MASUK</button>
<p style="text-align:center;color:#666;margin-top:15px;font-size:13px">Password default: taufiq123</p>
</div>

<!-- ADMIN PANEL -->
<div class="admin-box hidden" id="adminBox">
<h2 style="color:#22c55e;margin-bottom:20px">⚙️ Setting Toko</h2>
<div class="grid-2">
<input type="text" id="namaToko" placeholder="Nama Toko">
<input type="text" id="noWa" placeholder="No WA 62xxx tanpa +">
</div>
<button class="btn" onclick="saveSetting()">SIMPAN SETTING</button>

<hr style="margin:30px 0;border-color:#333">

<h2 style="color:#22c55e;margin-bottom:20px">📦 Tambah/Edit Produk</h2>
<div class="grid-2">
<input type="text" id="namaProduk" placeholder="Nama Produk: RAM 4GB Unlimited">
<input type="number" id="hargaProduk" placeholder="Harga: 4000">
<select id="kategoriProduk">
<option value="panel">Panel</option>
<option value="titel">Titel Panel</option>
<option value="scbot">SC Bot</option>
</select>
<select id="badgeProduk">
<option value="tidak">Badge: Tidak</option>
<option value="ya">Badge: Ya - 3 Slot</option>
</select>
</div>
<button class="btn" onclick="tambahProduk()">TAMBAH PRODUK</button>

<h2 style="color:#22c55e;margin:30px 0 20px 0">📋 Daftar Produk</h2>
<table>
<thead>
<tr>
<th>Nama</th>
<th>Harga</th>
<th>Kategori</th>
<th>Badge</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="listProduk"></tbody>
</table>

<h2 style="color:#22c55e;margin:30px 0 20px 0">📥 Pesanan Masuk</h2>
<table>
<thead>
<tr>
<th>Waktu</th>
<th>Produk</th>
<th>Total</th>
</tr>
</thead>
<tbody id="listPesanan"></tbody>
</table>

<button class="btn btn-danger" onclick="logout()">LOGOUT</button>
</div>
</div>

<script>
const ADMIN_PASS = 'taufiq123'; // GANTI PASSWORD DISINI

let produkList = JSON.parse(localStorage.getItem('produkList')) || [];
let setting = JSON.parse(localStorage.getItem('tokoSetting')) || {namaToko:'TAUFIQ STORE', noWa:'6287785037018'};

function login(){
  let pass = document.getElementById('passInput').value;
  if(pass === ADMIN_PASS){
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('adminBox').classList.remove('hidden');
    loadSetting();
    loadProdukTable();
    loadPesanan();
  } else {
    alert('Password salah bang!');
  }
}

function logout(){
  document.getElementById('loginBox').classList.remove('hidden');
  document.getElementById('adminBox').classList.add('hidden');
  document.getElementById('passInput').value = '';
}

function loadSetting(){
  document.getElementById('namaToko').value = setting.namaToko;
  document.getElementById('noWa').value = setting.noWa;
}

function saveSetting(){
  setting.namaToko = document.getElementById('namaToko').value;
  setting.noWa = document.getElementById('noWa').value;
  localStorage.setItem('tokoSetting', JSON.stringify(setting));
  alert('Setting tersimpan! Refresh panel.html buat liat perubahan');
}

function tambahProduk(){
  let nama = document.getElementById('namaProduk').value;
  let harga = document.getElementById('hargaProduk').value;
  let kategori = document.getElementById('kategoriProduk').value;
  let badge = document.getElementById('badgeProduk').value;
  
  if(!nama || !harga){
    alert('Nama dan harga wajib diisi bang!');
    return;
  }
  
  let id = Date.now();
  produkList.push({id, nama, harga: Number(harga), kategori, badge});
  localStorage.setItem('produkList', JSON.stringify(produkList));
  
  document.getElementById('namaProduk').value = '';
  document.getElementById('hargaProduk').value = '';
  loadProdukTable();
  alert('Produk ditambah! Cek panel.html');
}

function hapusProduk(id){
  if(confirm('Yakin hapus produk ini?')){
    produkList = produkList.filter(p => p.id !== id);
    localStorage.setItem('produkList', JSON.stringify(produkList));
    loadProdukTable();
  }
}

function loadProdukTable(){
  let html = '';
  produkList.forEach(p => {
    html += `<tr>
      <td>${p.nama}</td>
      <td>Rp${Number(p.harga).toLocaleString('id-ID')}</td>
      <td>${p.kategori}</td>
      <td><span class="badge badge-${p.badge}">${p.badge.toUpperCase()}</span></td>
      <td><button class="btn btn-small btn-danger" onclick="hapusProduk(${p.id})">Hapus</button></td>
    </tr>`;
  });
  document.getElementById('listProduk').innerHTML = html || '<tr><td colspan="5" style="text-align:center;color:#666">Belum ada produk</td></tr>';
}

function loadPesanan(){
  let pesanan = JSON.parse(localStorage.getItem('pesananList')) || [];
  let html = '';
  pesanan.slice().reverse().forEach(p => {
    let items = p.items.map(i => i.name).join(', ');
    let waktu = new Date(p.waktu).toLocaleString('id-ID');
    html += `<tr>
      <td>${waktu}</td>
      <td>${items}</td>
      <td>Rp${Number(p.total).toLocaleString('id-ID')}</td>
    </tr>`;
  });
  document.getElementById('listPesanan').innerHTML = html || '<tr><td colspan="3" style="text-align:center;color:#666">Belum ada pesanan</td></tr>';
}

// Enter buat login
document.getElementById('passInput').addEventListener('keypress', e => {
  if(e.key === 'Enter') login();
});
</script>
</body>
  </html>
